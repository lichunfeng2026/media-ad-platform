<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>聚媒通 · 自媒体广告投放平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --pri: #0d9488;
      --pri-l: #14b8a6;
      --pri-d: #0f766e;
      --acc: #f59e0b;
      --err: #ef4444;
      --ok: #22c55e;
      --warn: #f59e0b;
      --info: #06b6d4;
      --sb: #0f172a;
      --bg: #f1f5f9;
      --card: #ffffff;
      --tx: #1e293b;
      --tx2: #64748b;
      --bd: #e2e8f0;
      --r: 10px;
    }
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--tx);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    input, select, textarea, button {
      font-family: inherit;
    }

    /* 认证 */
    .auth {
      display: none;
      width: 100%;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e3a5f 50%, #0d4f4f);
      position: relative;
      overflow: auto;
    }
    .auth.on {
      display: flex;
    }
    .auth .bg {
      position: absolute;
      border-radius: 50%;
      opacity: .07;
      background: var(--pri);
    }
    .auth .bg:nth-child(1) {
      width: 500px;
      height: 500px;
      top: -150px;
      right: -100px;
    }
    .auth .bg:nth-child(2) {
      width: 300px;
      height: 300px;
      bottom: -80px;
      left: -50px;
    }
    .abox {
      width: 420px;
      background: rgba(255,255,255,.97);
      border-radius: 16px;
      box-shadow: 0 25px 60px rgba(0,0,0,.3);
      position: relative;
      z-index: 2;
      max-width: 95%;
    }
    .abox .hd {
      padding: 30px;
      text-align: center;
      background: linear-gradient(135deg, var(--pri), var(--pri-d));
      color: #fff;
    }
    .abox .hd .ico {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    .abox .hd h1 {
      font-size: 1.5rem;
      font-weight: 800;
    }
    .abox .hd p {
      opacity: .8;
      font-size: .88rem;
      margin-top: 4px;
    }
    .abox .bd {
      padding: 28px;
    }
    .fg {
      margin-bottom: 16px;
    }
    .fl {
      display: block;
      font-weight: 600;
      color: var(--tx);
      margin-bottom: 5px;
      font-size: .88rem;
    }
    .fi {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: .92rem;
      transition: border .2s;
      background: #fff;
    }
    .fi:focus {
      border-color: var(--pri);
      outline: none;
      box-shadow: 0 0 0 3px rgba(13,148,136,.1);
    }
    .fiw {
      position: relative;
    }
    .fiw i.l {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--tx2);
    }
    .fiw .fi {
      padding-left: 38px;
    }
    .fiw .tp {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--tx2);
      cursor: pointer;
    }
    .abtn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .2s;
    }
    .abtn:hover {
      transform: translateY(-1px);
    }
    .abtn-p {
      background: var(--pri);
      color: #fff;
    }
    .abtn-p:hover {
      background: var(--pri-d);
      box-shadow: 0 4px 12px rgba(13,148,136,.3);
    }
    .abtn-s {
      background: var(--ok);
      color: #fff;
    }
    .abtn-s:hover {
      background: #16a34a;
    }
    .frow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: .84rem;
    }
    .frow label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--tx2);
      cursor: pointer;
    }
    .frow a {
      color: var(--pri);
      text-decoration: none;
      font-weight: 600;
    }
    .abox .ft {
      padding: 18px 28px;
      text-align: center;
      border-top: 1px solid var(--bd);
      font-size: .88rem;
      color: var(--tx2);
    }
    .abox .ft a {
      color: var(--pri);
      text-decoration: none;
      font-weight: 600;
    }
    .pws {
      height: 4px;
      background: #e2e8f0;
      border-radius: 4px;
      margin-top: 5px;
      overflow: hidden;
    }
    .pws .bar {
      height: 100%;
      width: 0;
      transition: all .3s;
      border-radius: 4px;
    }
    .pws .txt {
      font-size: .73rem;
      margin-top: 2px;
      color: var(--tx2);
    }

    /* 主框架 */
    .app {
      display: none;
      height: 100vh;
      flex-direction: row;
    }
    .app.on {
      display: flex;
    }
    .sb {
      width: 248px;
      min-width: 248px;
      background: var(--sb);
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: all .3s;
      overflow: hidden;
      z-index: 100;
    }
    .sb-hd {
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sb-logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--pri), var(--pri-l));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 900;
      flex-shrink: 0;
    }
    .sb-brand {
      font-size: 1.1rem;
      font-weight: 800;
    }
    .sb-brand small {
      display: block;
      font-size: .62rem;
      color: rgba(255,255,255,.35);
      font-weight: 400;
    }
    .sb-user {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sb-av {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pri), var(--acc));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .sb-nm {
      font-weight: 600;
      font-size: .92rem;
      white-space: nowrap;
    }
    .sb-rl {
      font-size: .7rem;
      color: rgba(255,255,255,.4);
      background: rgba(13,148,136,.2);
      padding: 2px 7px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 2px;
    }
    .sb-nav {
      flex: 1;
      padding: 10px 0;
      overflow-y: auto;
    }
    .ns {
      padding: 7px 16px 5px;
      font-size: .68rem;
      text-transform: uppercase;
      color: rgba(255,255,255,.22);
      letter-spacing: 1.5px;
      font-weight: 700;
    }
    .ni {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 16px;
      color: rgba(255,255,255,.5);
      cursor: pointer;
      transition: all .15s;
      border-left: 3px solid transparent;
      font-size: .88rem;
      position: relative;
    }
    .ni:hover {
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.85);
    }
    .ni.on {
      background: rgba(13,148,136,.12);
      color: var(--pri-l);
      border-left-color: var(--pri-l);
    }
    .ni i {
      width: 18px;
      text-align: center;
      font-size: .95rem;
      flex-shrink: 0;
    }
    .nb {
      position: absolute;
      right: 13px;
      background: var(--err);
      color: #fff;
      font-size: .62rem;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 700;
    }
    .sb-ft {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .lo-btn {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 13px;
      background: rgba(239,68,68,.08);
      color: #f87171;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: .88rem;
    }
    .lo-btn:hover {
      background: rgba(239,68,68,.15);
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .top {
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      flex-shrink: 0;
    }
    .top-l {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mmenu {
      display: none;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: var(--tx);
      cursor: pointer;
    }
    .ptitle {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .top-r {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
    }
    .nbtn {
      position: relative;
      background: none;
      border: none;
      font-size: 1.1rem;
      color: var(--tx2);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nbtn:hover {
      background: #f1f5f9;
      color: var(--tx);
    }
    .nbdg {
      position: absolute;
      top: 2px;
      right: 2px;
      background: var(--err);
      color: #fff;
      font-size: .58rem;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }
    .tav {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pri), var(--acc));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: .8rem;
      cursor: pointer;
    }
    .cnt {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
    }

    /* 通知面板 */
    .npnl {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 350px;
      background: #fff;
      border-radius: 11px;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
      z-index: 2000;
      overflow: hidden;
      border: 1px solid var(--bd);
    }
    .npnl.on {
      display: block;
    }
    .npnl-h {
      padding: 12px 16px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .npnl-h strong {
      font-size: .92rem;
    }
    .npnl-h button {
      background: none;
      border: none;
      color: var(--pri);
      cursor: pointer;
      font-size: .78rem;
      font-weight: 600;
    }
    .ni2 {
      padding: 11px 16px;
      border-bottom: 1px solid #f8fafc;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .ni2:hover {
      background: #f8fafc;
    }
    .ni2.ur {
      background: #f0fdfa;
    }
    .ndot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--pri);
      flex-shrink: 0;
      margin-top: 6px;
    }
    .ntx b {
      font-size: .83rem;
      display: block;
    }
    .ntx p {
      font-size: .76rem;
      color: var(--tx2);
    }
    .ntx small {
      font-size: .68rem;
      color: #94a3b8;
    }
    .npnl-f {
      padding: 10px;
      text-align: center;
      border-top: 1px solid var(--bd);
    }
    .npnl-f a {
      color: var(--pri);
      text-decoration: none;
      font-size: .83rem;
      font-weight: 600;
    }

    /* 通用卡片 */
    .cd {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      border: 1px solid var(--bd);
      margin-bottom: 16px;
    }
    .cd-h {
      padding: 14px 18px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cd-h h3 {
      font-size: .95rem;
      font-weight: 700;
    }
    .cd-b {
      padding: 18px;
    }
    .sg {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .sc {
      background: var(--card);
      border-radius: var(--r);
      padding: 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      border: 1px solid var(--bd);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .si {
      width: 46px;
      height: 46px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .sv {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .sl {
      font-size: .78rem;
      color: var(--tx2);
    }
    .tb {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .inp, .sel {
      padding: 8px 12px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: .88rem;
      background: #fff;
    }
    .inp:focus, .sel:focus {
      border-color: var(--pri);
      outline: none;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:hover {
      transform: translateY(-1px);
    }
    .bp {
      background: var(--pri);
      color: #fff;
    }
    .bs {
      background: var(--ok);
      color: #fff;
    }
    .bd {
      background: var(--err);
      color: #fff;
    }
    .bw {
      background: var(--warn);
      color: #fff;
    }
    .bg {
      background: transparent;
      border: 1.5px solid var(--bd);
      color: var(--tx2);
    }
    .bsm {
      padding: 5px 10px;
      font-size: .78rem;
      border-radius: 6px;
    }
    .badge {
      padding: 2px 9px;
      border-radius: 11px;
      font-size: .72rem;
      font-weight: 700;
      display: inline-block;
    }
    .b-ok {
      background: rgba(34,197,94,.1);
      color: var(--ok);
    }
    .b-wr {
      background: rgba(245,158,11,.1);
      color: var(--warn);
    }
    .b-er {
      background: rgba(239,68,68,.1);
      color: var(--err);
    }
    .b-in {
      background: rgba(6,182,212,.1);
      color: var(--info);
    }
    .tw {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f8fafc;
      padding: 10px 14px;
      text-align: left;
      font-weight: 700;
      font-size: .78rem;
      color: var(--tx2);
      border-bottom: 1px solid var(--bd);
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #f8fafc;
      font-size: .88rem;
    }
    tr:hover td {
      background: #f8fafc;
    }

    /* 模态框 */
    .mdl {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.45);
      z-index: 3000;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 12px;
      overflow-y: auto;
    }
    .mdl.on {
      display: flex;
    }
    .mbox {
      background: #fff;
      border-radius: 13px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 20px 50px rgba(0,0,0,.18);
      margin: auto;
      animation: mi .2s ease;
    }
    @keyframes mi {
      from {
        opacity: 0;
        transform: translateY(-15px) scale(.98);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }
    .mbox.lg {
      max-width: 900px;
    }
    .mh {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 22px;
      border-bottom: 1px solid var(--bd);
    }
    .mc {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--tx2);
      width: 32px;
      height: 32px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mb {
      padding: 22px;
    }
    .mf {
      padding: 12px 22px;
      border-top: 1px solid var(--bd);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* 富媒体编辑器 */
    .edtb {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px;
      background: #f8fafc;
      border: 1px solid var(--bd);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
    }
    .eb {
      background: #fff;
      border: 1px solid var(--bd);
      border-radius: 4px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: .8rem;
      color: var(--tx);
    }
    .eb:hover {
      background: #e2e8f0;
    }
    .erea {
      min-height: 180px;
      border: 1px solid var(--bd);
      border-radius: 0 0 8px 8px;
      padding: 12px;
      background: #fff;
      outline: none;
      line-height: 1.7;
    }
    .erea:focus {
      border-color: var(--pri);
    }

    /* 平台选择器 */
    .plat-sel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .plat-tag {
      padding: 5px 12px;
      border: 1.5px solid var(--bd);
      border-radius: 18px;
      font-size: .78rem;
      cursor: pointer;
      transition: all .15s;
    }
    .plat-tag.sel {
      background: var(--pri);
      color: #fff;
      border-color: var(--pri);
    }

    /* 分享面板 */
    .spnl {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .sb2 {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 600;
      color: #fff;
    }
    .sb-wx {
      background: #07c160;
    }
    .sb-wb {
      background: #e6162d;
    }
    .sb-qq {
      background: #12b7f5;
    }
    .sb-cp {
      background: var(--pri);
    }

    /* 空状态 */
    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--tx2);
    }
    .pg {
      display: none;
    }
    .pg.on {
      display: block;
    }

    @media(max-width:768px) {
      .sb {
        position: fixed;
        left: -260px;
        z-index: 500;
      }
      .sb.mson {
        left: 0;
      }
      .mmenu {
        display: flex;
      }
      .sbov {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.35);
        z-index: 400;
      }
      .sbov.on {
        display: block;
      }
      .sg {
        grid-template-columns: repeat(2,1fr);
      }
      .crow {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 登录/注册等认证页面保持不变，略做增强 -->
  <div class="auth on" id="pgLogin">

  <div id="toast" style="display:none;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 24px;border-radius:20px;font-size:.88rem;z-index:9999;"></div>

  <script>
    const platforms = ['微信','朋友圈','头条','知乎','抖音','快手','小红书','QQ','微博','百家号','公众号','企鹅号','网站'];
    let currentArticleId = null;
    let notifications = [
      {id:1,title:'文章《自媒体运营技巧》发布成功',desc:'已同步到微信公众号、头条号',time:'10分钟前',unread:true},
      {id:2,title:'广告收益到账 ¥580',desc:'横幅广告「某某教育」今日收益',time:'30分钟前',unread:true},
      {id:3,title:'新用户「周七」注册',desc:'来源：微信分享链接',time:'1小时前',unread:true},
      {id:4,title:'分享到微信群，获得 ¥45 收益',desc:'文章：短视频变现策略',time:'2小时前',unread:true},
      {id:5,title:'广告主「某某品牌」提交投放申请',desc:'预算 ¥2000，投放7天',time:'3小时前',unread:true}
    ];

    function renderNotifications() {
      const nList = document.getElementById('nList');
      nList.innerHTML = notifications.map(n=>`
        <div class="ni2 ${n.unread?'ur':''}" data-nid="${n.id}">
          <div class="ndot ${n.unread?'':'rd'}"></div>
          <div class="ntx"><b>${n.title}</b><p>${n.desc}</p><small>${n.time}</small></div>
        </div>`).join('');
      const unreadCount = notifications.filter(n=>n.unread).length;
      const badge = document.getElementById('nBdg');
      badge.textContent = unreadCount;
      badge.style.display = unreadCount>0?'flex':'none';
    }
    function addNotification(title,desc) {
      notifications.unshift({id:Date.now(),title,desc,time:'刚刚',unread:true});
      renderNotifications();
      toast(title,'info');
    }

    function renderPlatSelector() {
      const container = document.getElementById('platContainer');
      container.innerHTML = platforms.map(p=>`<span class="plat-tag" data-plat="${p}" onclick="togglePlat(this)">${p}</span>`).join('');
    }
    function togglePlat(el) { el.classList.toggle('sel'); }
    function getSelectedPlatforms() {
      return [...document.querySelectorAll('#platContainer .plat-tag.sel')].map(el=>el.dataset.plat);
    }

    function execCmd(cmd, value=null) {
      document.execCommand(cmd, false, value);
      document.getElementById('artContent').focus();
    }
    function insertLink() {
      const url = prompt('输入链接地址:','https://');
      if(url) execCmd('createLink', url);
    }
    function insertImage() {
      const url = prompt('输入图片URL:','https://');
      if(url) execCmd('insertImage', url);
    }
    function insertVideo() {
      const url = prompt('输入视频嵌入代码或URL:','https://');
      if(url) document.execCommand('insertHTML',false,`<div style="background:#f1f5f9;padding:20px;text-align:center;border:1px dashed #ccc;">🎬 视频: ${url}</div>`);
    }
    function insertTable() {
      const html = '<table border="1" style="width:100%;border-collapse:collapse;"><tr><td>单元格1</td><td>单元格2</td></tr><tr><td>单元格3</td><td>单元格4</td></tr></table>';
      document.execCommand('insertHTML',false,html);
    }
    function insertCode() {
      const code = prompt('输入代码片段:','console.log("hello");');
      if(code) document.execCommand('insertHTML',false,`<pre style="background:#1e293b;color:#fff;padding:10px;border-radius:6px;"><code>${code}</code></pre>`);
    }
    function insertAdPlaceholder() {
      document.execCommand('insertHTML',false,`<div style="background:#fff3cd;border:1px dashed #f59e0b;padding:8px;margin:10px 0;text-align:center;font-weight:bold;">📢 广告位 (待投放)</div>`);
    }

    function openArtEd(articleId=null) {
      currentArticleId = articleId;
      document.getElementById('artEdTitle').textContent = articleId?'编辑文章':'创作文章';
      document.getElementById('artTitle').value = articleId?'自媒体运营的10个核心技巧':'';
      document.getElementById('artContent').innerHTML = articleId?'<p>编辑已有内容...</p>':'<p>开始撰写文章...</p>';
      renderPlatSelector();
      document.getElementById('mdlArtEd').classList.add('on');
    }
    function saveArticle() {
      const title = document.getElementById('artTitle').value.trim();
      if(!title) return toast('请输入标题','warn');
      clsMdl('mdlArtEd');
      addNotification(`文章《${title}》已保存为草稿`,'');
    }
    function publishArticle() {
      const title = document.getElementById('artTitle').value.trim();
      const plats = getSelectedPlatforms();
      if(!title) return toast('请输入标题','warn');
      if(plats.length===0) return toast('请至少选择一个发布平台','warn');
      clsMdl('mdlArtEd');
      addNotification(`文章《${title}》已发布到 ${plats.join('、')}`,'');
    }

    function openFetchModal() {
      document.getElementById('mdlFetch').classList.add('on');
    }
    function fetchArticle() {
      const input = document.getElementById('fetchInput').value.trim();
      if(!input) return toast('请输入URL或关键词','warn');
      clsMdl('mdlFetch');
      setTimeout(()=>{
        openArtEd();
        document.getElementById('artTitle').value = '抓取的文章：' + input.substring(0,20);
        document.getElementById('artContent').innerHTML = '<p>已抓取内容并导入编辑器，您可以继续编辑。</p>';
        toast('文章抓取成功，已导入编辑器','ok');
      },600);
    }

    function openAdEd() { document.getElementById('mdlAdEd').classList.add('on'); }
    function createAd() {
      const name = document.getElementById('adName').value.trim();
      if(!name) return toast('请输入广告名称','warn');
      clsMdl('mdlAdEd');
      addNotification(`广告「${name}」已创建并提交审核`,'');
    }

    function openShareModal() { document.getElementById('mdlShare').classList.add('on'); }
    function doShare(platform) {
      clsMdl('mdlShare');
      const earn = (Math.random()*80+20).toFixed(2);
      addNotification(`分享到${platform}，预计收益 ¥${earn}`,'');
    }

    function swAuth(page) {
      document.querySelectorAll('.auth').forEach(el=>el.classList.remove('on'));
      document.getElementById('pg'+page.charAt(0).toUpperCase()+page.slice(1)).classList.add('on');
    }
    function doLogin() {
      const u=document.getElementById('lgU').value.trim(), p=document.getElementById('lgP').value.trim();
      if(!u||!p) return toast('请输入账号和密码','err');
      document.querySelectorAll('.auth').forEach(el=>el.classList.remove('on'));
      document.getElementById('appMain').classList.add('on');
      initDashboardCharts(); renderNotifications();
      toast('登录成功，欢迎回来！','ok');
    }
    function doLogout() {
      document.getElementById('appMain').classList.remove('on');
      document.getElementById('pgLogin').classList.add('on');
    }
    function doReg() {
      const u=document.getElementById('rgU').value.trim(), ph=document.getElementById('rgPh').value.trim(), p1=document.getElementById('rgP1').value, p2=document.getElementById('rgP2').value;
      if(!u||!ph||!p1||!p2) return toast('请填写所有必填项','err');
      if(p1.length<6) return toast('密码至少6位','err');
      if(p1!==p2) return toast('两次密码不一致','err');
      toast('注册成功！请登录','ok'); swAuth('login');
    }
    function doReset() { toast('密码重置成功','ok'); swAuth('login'); }
    function sndCode() { toast('验证码已发送','info'); }
    function chkPw(v) { /* 简化 */ }
    function togPw(btn) {
      const input=btn.parentElement.querySelector('input');
      const icon=btn.querySelector('i');
      if(input.type==='password'){input.type='text';icon.classList.replace('fa-eye','fa-eye-slash');}
      else{input.type='password';icon.classList.replace('fa-eye-slash','fa-eye');}
    }
    function togNp(){ document.getElementById('nPnl').classList.toggle('on'); }
    function clrNp(){ notifications.forEach(n=>n.unread=false); renderNotifications(); toast('全部已读','info'); }
    function togSb(){ document.getElementById('sb').classList.toggle('mson'); document.getElementById('sbOv').classList.toggle('on'); }
    function clsSb(){ document.getElementById('sb').classList.remove('mson'); document.getElementById('sbOv').classList.remove('on'); }
    function clsMdl(id){ document.getElementById(id).classList.remove('on'); }
    function toast(msg,type='info'){
      const el=document.getElementById('toast');
      el.style.background=type==='ok'?'#22c55e':type==='err'?'#ef4444':type==='warn'?'#f59e0b':'#1e293b';
      el.textContent=msg; el.style.display='block';
      clearTimeout(el._timeout); el._timeout=setTimeout(()=>el.style.display='none',2500);
    }

    const pageTitles={dashboard:'工作台',articles:'文章管理',ads:'广告管理',analytics:'数据分析',income:'收益中心',users:'用户管理',data:'数据管理',settings:'系统设置',profile:'个人中心'};
    const pageIcons={dashboard:'fa-th-large',articles:'fa-file-alt',ads:'fa-ad',analytics:'fa-chart-line',income:'fa-wallet',users:'fa-users-cog',data:'fa-database',settings:'fa-cog',profile:'fa-user-circle'};
    function nav(page) {
      document.querySelectorAll('.ni').forEach(el=>el.classList.remove('on'));
      document.querySelector(`.ni[data-p="${page}"]`).classList.add('on');
      document.getElementById('pgT').innerHTML=`<i class="fas ${pageIcons[page]}"></i> ${pageTitles[page]}`;
      document.querySelectorAll('.pg').forEach(el=>el.classList.remove('on'));
      const pg = document.getElementById('pg-'+page);
      if(pg) pg.classList.add('on');
      document.getElementById('sb').classList.remove('mson'); document.getElementById('sbOv').classList.remove('on');
      if(page==='dashboard') initDashboardCharts();
      if(page==='analytics') initAnalyticsCharts();
    }

    function initDashboardCharts() {
      // 内联简化，保留基本图表
      const ctx1=document.getElementById('chInc');
      if(ctx1 && !ctx1._chart) ctx1._chart=new Chart(ctx1,{type:'line',data:{labels:['周一','周二','周三','周四','周五','周六','周日'],datasets:[{label:'收益',data:[4200,3800,5100,4600,5800,6200,5500],borderColor:'#0d9488'}]}});
    }
    function initAnalyticsCharts() {
      const ctx4=document.getElementById('chRead');
      if(ctx4 && !ctx4._chart) ctx4._chart=new Chart(ctx4,{type:'line',data:{labels:['01/01','01/05','01/10','01/15','01/20','01/25'],datasets:[{label:'阅读量',data:[12000,15000,13500,18000,16000,22000],borderColor:'#0d9488'}]}});
    }

    // 页面内容构建（简化，动态注入）
    function buildPages() {
      const cnt = document.getElementById('cntArea');
      cnt.innerHTML = `
        <div class="pg on" id="pg-dashboard">${dashboardHTML()}</div>
        <div class="pg" id="pg-articles">${articlesHTML()}</div>
        <div class="pg" id="pg-ads">${adsHTML()}</div>
        <div class="pg" id="pg-analytics">${analyticsHTML()}</div>
        <div class="pg" id="pg-income">${incomeHTML()}</div>
        <div class="pg" id="pg-users">${usersHTML()}</div>
        <div class="pg" id="pg-data">${dataHTML()}</div>
        <div class="pg" id="pg-settings">${settingsHTML()}</div>
        <div class="pg" id="pg-profile">${profileHTML()}</div>
      `;
    }
    function dashboardHTML(){
      return `<div class="sg"><div class="sc"><div class="si" style="background:rgba(13,148,136,.1);color:var(--pri)"><i class="fas fa-file-alt"></i></div><div><div class="sv">128</div><div class="sl">文章总数</div></div></div><div class="sc"><div class="si" style="background:rgba(245,158,11,.1);color:var(--acc)"><i class="fas fa-ad"></i></div><div><div class="sv">56</div><div class="sl">广告总数</div></div></div><div class="sc"><div class="si" style="background:rgba(34,197,94,.1);color:var(--ok)"><i class="fas fa-wallet"></i></div><div><div class="sv">¥38,520</div><div class="sl">本月收益</div></div></div><div class="sc"><div class="si" style="background:rgba(6,182,212,.1);color:var(--info)"><i class="fas fa-users"></i></div><div><div class="sv">3,842</div><div class="sl">用户总数</div></div></div></div>
      <div class="cd"><div class="cd-h"><h3>收益趋势</h3></div><div class="cd-b"><canvas id="chInc" style="height:200px;"></canvas></div></div>`;
    }
    function articlesHTML(){
      return `<div class="tb"><div class="tb-l"><input class="inp" placeholder="搜索文章..."><select class="sel"><option>全部状态</option></select></div><div class="tb-r"><button class="btn bp" onclick="openArtEd()"><i class="fas fa-plus"></i> 创作文章</button><button class="btn bg" onclick="openFetchModal()"><i class="fas fa-cloud-download-alt"></i> 抓取文章</button></div></div>
      <div class="ag" id="articleList"></div>`;
    }
    function adsHTML(){
      return `<div class="tb"><div class="tb-l"><input class="inp" placeholder="搜索广告..."></div><div class="tb-r"><button class="btn bp" onclick="openAdEd()"><i class="fas fa-plus"></i> 创建广告</button></div></div><div class="adg" id="adList"></div>`;
    }
    function analyticsHTML(){
      return `<div class="cd"><div class="cd-h"><h3>阅读量趋势</h3></div><canvas id="chRead" style="height:200px;"></canvas></div>`;
    }
    function incomeHTML(){
      return `<div class="cd"><div class="cd-h"><h3>收益中心</h3></div><div class="cd-b"><p>总收益池：¥156,800 | 本月预算：¥50,000 | 个人权益：超级管理员 (100%分成)</p><button class="btn bp" onclick="toast('提现申请已提交','ok')"><i class="fas fa-money-bill-wave"></i> 申请提现</button></div></div>`;
    }
    function usersHTML(){
      return `<div class="tb"><div class="tb-l"><input class="inp" placeholder="搜索用户..."></div><div class="tb-r"><button class="btn bp" onclick="toast('添加用户功能','info')"><i class="fas fa-user-plus"></i> 添加</button></div></div><table><thead><tr><th>用户</th><th>角色</th><th>权限</th><th>操作</th></tr></thead><tbody><tr><td>管理员</td><td>超级管理员</td><td>全部</td><td><button class="btn bsm bg">编辑</button></td></tr></tbody></table>`;
    }
    function dataHTML(){
      return `<div class="cd"><div class="cd-h"><h3>数据管理</h3></div><div class="cd-b"><button class="btn bp" onclick="toast('备份中...','info')">备份</button> <button class="btn bg" onclick="toast('恢复功能','info')">恢复</button></div></div>`;
    }
    function settingsHTML(){
      return `<div class="cd"><div class="cd-h"><h3>系统设置</h3></div><div class="cd-b"><input class="fi2" placeholder="站点名称" value="聚媒通"><button class="btn bp" style="margin-top:10px;" onclick="toast('已保存','ok')">保存</button></div></div>`;
    }
    function profileHTML(){
      return `<div class="cd"><div class="cd-h"><h3>个人中心</h3></div><div class="cd-b"><p>用户名：管理员 | 角色：超级管理员</p><button class="btn bp" onclick="toast('信息已更新','ok')">保存</button></div></div>`;
    }

    // 初始化
    document.addEventListener('DOMContentLoaded',()=>{
      buildPages();
      renderNotifications();
      document.querySelectorAll('.ni').forEach(el=>el.addEventListener('click',function(){nav(this.dataset.p);}));
      document.addEventListener('click',function(e){
        const np=document.getElementById('nPnl'), nb=document.getElementById('nBtn');
        if(np.classList.contains('on') && !np.contains(e.target) && !nb.contains(e.target)) np.classList.remove('on');
      });
      // 模拟文章分享按钮
      window.shareArticle = function(title){
        document.getElementById('mdlShare').classList.add('on');
      };
    });
  </script>
</body>
    </html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AdForge Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC','Space Grotesk',sans-serif;background:#0e1017;color:#e6e8f0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#252a3a;border-radius:9px}

:root{--side:#12141e;--card:#181c28;--border:#252a3a;--bg:#0e1017;--fg:#e6e8f0;--fg2:#b8bcc8;--muted:#5c6178;--accent:#e89b3a;--accent2:#3dd68c;--danger:#e5484d;--info:#38bdf8;--toolbar:#111420;--editor:#151925;--codebg:#0a0d16}

/* 侧边栏 */
.sb{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--side);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sb.open{transform:translateX(0)}
.sb-mask{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:45;opacity:0;pointer-events:none;transition:opacity .25s}.sb-mask.on{opacity:1;pointer-events:auto}
.sb-hd{padding:12px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-shrink:0}
.sb-logo{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,#e89b3a,#f4a623);display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;font-weight:800;flex-shrink:0}
.sb-hd span{font-family:'Space Grotesk';font-size:13px;font-weight:700;background:linear-gradient(135deg,#e89b3a,#f4a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-role{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:4px}
.role-btn{flex:1;padding:5px 0;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:9px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s}
.role-btn:hover{border-color:var(--accent);color:var(--fg)}
.role-btn.on{border-color:var(--accent);background:rgba(232,155,58,.08);color:#fbbf24}
.role-btn i{display:block;font-size:12px;margin-bottom:2px}
.sb-search{padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.sb-search input{width:100%;height:26px;border-radius:5px;background:var(--bg);border:1px solid var(--border);padding:0 7px 0 22px;color:var(--fg);font-size:10px;outline:none}
.sb-search input:focus{border-color:var(--accent)}
.sb-search i{position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:9px;pointer-events:none}
.sb-list{flex:1;overflow-y:auto;padding:3px}
.art-item{padding:8px 9px;border-radius:6px;cursor:pointer;transition:all .1s;margin-bottom:1px;border:1px solid transparent;position:relative}
.art-item:hover{background:rgba(255,255,255,.02);border-color:var(--border)}
.art-item.on{background:rgba(232,155,58,.07);border-color:rgba(232,155,58,.15)}
.art-item .at{font-size:10px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:30px}
.art-item .ad{font-size:8px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:3px}
.art-item .ptag{padding:0 4px;border-radius:2px;font-size:7px;font-weight:700;flex-shrink:0}
.ptag-admin{background:rgba(232,155,58,.1);color:#fbbf24}
.ptag-creator{background:rgba(61,214,140,.1);color:#34d399}
.ptag-sharer{background:rgba(255,255,255,.04);color:var(--muted)}
.art-item .ab{position:absolute;right:6px;top:8px;display:flex;gap:1px;opacity:0;transition:opacity .1s}
.art-item:hover .ab{opacity:1}
.abtn{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);background:none;border:none;font-size:8px;transition:all .1s}
.abtn:hover{color:var(--fg);background:rgba(255,255,255,.05)}
.abtn.del:hover{color:var(--danger);background:rgba(229,72,77,.08)}
.sb-ft{padding:8px;border-top:1px solid var(--border);flex-shrink:0}

/* 侧边栏切换按钮 - 固定不浮动 */
.sb-toggle{position:fixed;top:10px;left:10px;z-index:55;width:36px;height:36px;border-radius:50%;background:var(--card);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);font-size:14px;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.3);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.sb-toggle:hover{box-shadow:0 4px 18px rgba(232,155,58,.3)}
.sb-toggle.active{left:270px;background:var(--accent);color:#000}
.sb-toggle.active i{transform:rotate(90deg)}

/* 主区域 */
.main{height:100vh;display:flex;flex-direction:column}
.topbar{height:44px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px 0 52px;gap:5px;background:var(--toolbar);flex-shrink:0}
.topbar .ti{flex:1;background:transparent;border:none;color:var(--fg);font-size:14px;font-weight:700;outline:none;font-family:inherit;min-width:0}
.topbar .ti::placeholder{color:var(--border)}
.topbar .ti:disabled{opacity:.3}
.mbtn{padding:3px 10px;border-radius:4px;font-size:9px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .12s;white-space:nowrap;flex-shrink:0}
.mbtn:hover{color:var(--fg);border-color:var(--accent)}.mbtn.on{background:var(--accent);color:#000;border-color:var(--accent)}
.mbtn:disabled{opacity:.25;cursor:not-allowed;transform:none!important}
.mbtn.pub{color:var(--warn);border-color:rgba(240,160,48,.2)}.mbtn.pub:hover{background:var(--warn);color:#000}
.mbtn.rev{color:var(--info);border-color:rgba(56,189,248,.15)}.mbtn.rev:hover{background:var(--info);color:#000}

/* 工具栏 - 所有按钮固定不浮动 */
.toolbar{display:flex;align-items:center;gap:1px;padding:2px 6px;border-bottom:1px solid var(--border);background:var(--toolbar);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.toolbar::-webkit-scrollbar{display:none}
.tb{width:28px;height:26px;min-width:28px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .08s;font-size:10px;border:none;background:transparent;flex-shrink:0}
.tb:hover{color:var(--fg);background:rgba(255,255,255,.05)}
.tb:active{transform:scale(.86);background:rgba(255,255,255,.08)}
.tb.on{color:var(--accent);background:rgba(232,155,58,.08)}
.tb-sep{width:1px;height:12px;background:var(--border);margin:0 1px;flex-shrink:0}
.tb-accent{color:var(--warn)!important}.tb-accent:hover{background:rgba(232,155,58,.08)!important}

.ib{display:none;padding:5px 10px;background:rgba(232,155,58,.05);border-bottom:1px solid rgba(232,155,58,.1);align-items:center;gap:5px}
.ib.show{display:flex}
.ib label{font-size:9px;color:var(--accent);font-weight:700;white-space:nowrap}
.ib input{flex:1;height:24px;padding:0 7px;border-radius:4px;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-size:11px;outline:none}
.ib input:focus{border-color:var(--accent)}
.ib-b{padding:3px 10px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;border:none;transition:all .1s}
.ib-ok{background:var(--accent);color:#000}.ib-no{background:transparent;border:1px solid var(--border);color:var(--muted)}

.pb{display:none;padding:5px 10px;background:rgba(56,189,248,.05);border-bottom:1px solid rgba(56,189,248,.1);align-items:center;gap:6px;font-size:10px;color:var(--info)}
.pb.show{display:flex}
.pb-b{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;border:none}
.pb-y{background:var(--info);color:#000}.pb-n{background:transparent;border:1px solid var(--border);color:var(--muted)}

.ew{flex:1;overflow-y:auto;padding:16px 14px;background:var(--editor)}
.ed{outline:none;min-height:120px;line-height:1.8;font-size:14px;color:var(--fg)}
.ed:empty::before{content:'开始撰写你的文章...';color:var(--border);pointer-events:none;font-style:italic}
.ed h1{font-size:24px;font-weight:900;margin:16px 0 8px;color:#fff}
.ed h2{font-size:18px;font-weight:700;margin:12px 0 6px;color:#e8eaf0}
.ed h3{font-size:16px;font-weight:700;margin:10px 0 5px}
.ed h4{font-size:14px;font-weight:600;margin:8px 0 4px}
.ed p{margin:5px 0;color:var(--fg2)}
.ed blockquote{border-left:3px solid var(--accent);padding:5px 12px;margin:8px 0;background:rgba(232,155,58,.03);border-radius:0 6px 6px 0}
.ed ul,.ed ol{padding-left:20px;margin:5px 0;color:var(--fg2)}.ed li{margin:2px 0}
.ed a{color:var(--accent2);text-decoration:underline}
.ed hr{border:none;height:1px;background:var(--border);margin:14px 0}
.ed img{max-width:100%;border-radius:6px;margin:8px 0;display:block}
.ad-ph{margin:12px 0;border:2px dashed rgba(240,160,48,.25);border-radius:7px;padding:10px 12px;background:rgba(240,160,48,.02);display:flex;align-items:center;gap:10px;user-select:all}
.ad-ph:hover{border-color:rgba(240,160,48,.4)}
.ad-ph-icon{width:28px;height:28px;border-radius:5px;background:rgba(240,160,48,.08);display:flex;align-items:center;justify-content:center;color:var(--warn);font-size:11px;flex-shrink:0}
.ad-ph-info{flex:1}.ad-ph-label{font-size:10px;font-weight:700;color:var(--warn)}.ad-ph-desc{font-size:8px;color:var(--muted);margin-top:1px}
.ad-ph-del{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:8px;background:none;border:none;flex-shrink:0;transition:all .1s}
.ad-ph-del:hover{color:var(--danger);background:rgba(229,72,77,.08)}
.cw{margin:10px 0;border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--codebg)}
.cwh{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.cwh span{font-size:9px;color:var(--info);font-weight:600;font-family:'Space Grotesk'}
.cwh button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:8px;padding:1px 4px;border-radius:2px;transition:all .1s}
.cwh button:hover{color:var(--fg);background:rgba(255,255,255,.05)}
.cw pre{margin:0;padding:10px;overflow-x:auto;font-family:'Space Grotesk',monospace;font-size:11px;line-height:1.5;color:#7dd3fc;white-space:pre;tab-size:2}
.pw{flex:1;overflow-y:auto;padding:16px 14px;background:var(--editor);display:none}
.pv{max-width:600px;margin:0 auto;line-height:1.8;font-size:14px}
.pv h1{font-size:24px;font-weight:900;margin:16px 0 8px;color:#fff}
.pv h2{font-size:18px;font-weight:700;margin:12px 0 6px}.pv h3{font-size:16px;font-weight:700;margin:10px 0 5px}
.pv p{margin:5px 0;color:var(--fg2)}
.pv blockquote{border-left:3px solid var(--accent);padding:5px 12px;margin:8px 0;background:rgba(232,155,58,.03);border-radius:0 6px 6px 0}
.pv img{max-width:100%;border-radius:6px;margin:8px 0}
.pv hr{border:none;height:1px;background:var(--border);margin:14px 0}
.pv code{font-family:'Space Grotesk',monospace;font-size:11px;background:rgba(255,255,255,.05);padding:1px 4px;border-radius:2px}
.pv pre{margin:10px 0;border-radius:6px;padding:10px;background:var(--codebg);overflow-x:auto;border:1px solid var(--border)}
.pv pre code{background:none;padding:0;font-size:11px;color:#7dd3fc;line-height:1.5}
.pv .ad-render{margin:12px 0;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.pv .ad-render img{width:100%;display:block}
.pv .ad-label{font-size:7px;color:rgba(255,255,255,.2);text-align:right;padding:2px 5px;background:rgba(0,0,0,.2)}
.pv .ad-empty{margin:12px 0;border:1px dashed var(--border);border-radius:6px;padding:18px;text-align:center;font-size:10px;color:var(--muted)}
.statbar{height:24px;border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-size:8px;color:var(--muted);background:var(--toolbar);gap:10px;flex-shrink:0}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center;padding:12px}
.mo.show{display:flex;animation:fi .12s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.ml{background:var(--card);border:1px solid var(--border);border-radius:10px;width:100%;max-width:420px;animation:sd .15s ease}
@keyframes sd{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mh h4{font-size:12px;font-weight:700}
.mx{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);background:none;border:none;transition:all .1s;font-size:11px}
.mx:hover{color:var(--fg);background:rgba(255,255,255,.05)}
.mb{padding:10px 14px}
.mf{padding:8px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:6px}
.btn{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:4px;font-size:9px;font-weight:700;cursor:pointer;border:none;transition:all .12s;white-space:nowrap}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{opacity:.85}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--fg)}.btn-g:hover{border-color:var(--accent)}
.btn-d{background:rgba(229,72,77,.08);color:#f87171;border:1px solid rgba(229,72,77,.12)}.btn-d:hover{background:rgba(229,72,77,.15)}

.pm{position:fixed;z-index:60;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px 0;min-width:130px;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.pm::before{content:'';position:absolute;top:-4px;left:14px;border:4px solid transparent;border-bottom-color:var(--border)}
.pm-i{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;transition:background .08s;font-size:10px;white-space:nowrap}
.pm-i:hover{background:rgba(255,255,255,.04)}
.pm-i i{width:12px;text-align:center;font-size:9px;flex-shrink:0}
.pm-div{height:1px;background:var(--border);margin:2px 0}

.share-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.share-ch{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);cursor:pointer;transition:all .12s;flex:1;min-width:80px}
.share-ch:hover{border-color:var(--accent2);background:rgba(61,214,140,.05)}
.share-ch i{font-size:12px}
.share-ch .sc-name{font-size:9px;font-weight:600;flex:1}
.share-ch .sc-toggle{width:28px;height:14px;border-radius:7px;background:var(--border);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.share-ch .sc-toggle.on{background:var(--accent2)}
.share-ch .sc-toggle::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;transition:transform .15s}
.share-ch .sc-toggle.on::after{transform:translateX(14px)}
.share-ch .sc-earn{font-size:8px;color:var(--muted);text-align:center;margin-top:2px}
.rev-bar{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px;margin-top:10px}
.rev-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:10px}
.rev-item .ri-label{color:var(--muted)}.rev-item .ri-val{font-family:'Space Grotesk';font-weight:700;color:var(--accent)}

.tc-w{position:fixed;top:8px;right:8px;z-index:200;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.toast{padding:6px 12px;border-radius:6px;font-size:10px;font-weight:500;display:flex;align-items:center;gap:5px;animation:ti .15s;border:1px solid;pointer-events:auto;backdrop-filter:blur(6px)}
.toast.ok{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.15);color:#34d399}
.toast.err{background:rgba(229,72,77,.12);border-color:rgba(229,72,77,.15);color:#f87171}
.toast.inf{background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.15);color:#22d3ee}
@keyframes ti{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.embed-code{background:#0a0d16;border:1px solid var(--border);border-radius:6px;padding:8px;font-family:'Space Grotesk',monospace;font-size:9px;line-height:1.5;color:#7dd3fc;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:200px;position:relative;user-select:all}
.embed-copy{position:absolute;top:4px;right:4px;padding:2px 8px;border-radius:3px;background:var(--accent);color:#000;font-size:8px;font-weight:700;cursor:pointer;border:none}
</style>
</head>
<body>

<aside class="sb" id="SB"><div class="sb-hd"><div class="sb-logo"><i class="fas fa-bolt"></i></div><span>AdForge</span></div>
<div class="sb-role" id="roleBar">
<button class="role-btn on" type="button" data-role="admin"><i class="fas fa-shield-halved"></i>管理员</button>
<button class="role-btn" type="button" data-role="creator"><i class="fas fa-pen-nib"></i>创作者</button>
<button class="role-btn" type="button" data-role="sharer"><i class="fas fa-share-nodes"></i>分享者</button>
</div>
<div class="sb-search"><i class="fas fa-search"></i><input placeholder="搜索..." id="searchInp"></div>
<div class="sb-list" id="artList"></div>
<div class="sb-ft" id="sbFt"></div>
</aside>

<div class="sb-mask" id="SBMask"></div>
<button class="sb-toggle" id="SBToggle" type="button"><i class="fas fa-bars"></i></button>

<div class="main">
<header class="topbar"><input class="ti" id="titleInp" placeholder="文章标题...">
<button class="mbtn on" id="btnEdit" type="button">编辑</button>
<button class="mbtn" id="btnPv" type="button">预览</button>
<button class="mbtn pub" id="pubBtn" type="button"><i class="fas fa-rocket" style="margin-right:2px"></i>发布</button>
<button class="mbtn rev" id="revBtn" type="button"><i class="fas fa-chart-line" style="margin-right:2px"></i>收益</button>
<button class="mbtn rev" id="embedBtn" type="button"><i class="fas fa-code" style="margin-right:2px"></i>嵌入</button>
</header>
<div class="toolbar" id="toolbar">
<button class="tb" data-cmd="bold"><i class="fas fa-bold"></i></button>
<button class="tb" data-cmd="italic"><i class="fas fa-italic"></i></button>
<button class="tb" data-cmd="underline"><i class="fas fa-underline"></i></button>
<button class="tb" data-cmd="strikeThrough"><i class="fas fa-strikethrough"></i></button>
<div class="tb-sep"></div>
<button class="tb" data-cmd="h1">H1</button><button class="tb" data-cmd="h2">H2</button>
<button class="tb" data-cmd="h3">H3</button><button class="tb" data-cmd="p">P</button>
<div class="tb-sep"></div>
<button class="tb" data-cmd="insertUnorderedList"><i class="fas fa-list-ul"></i></button>
<button class="tb" data-cmd="insertOrderedList"><i class="fas fa-list-ol"></i></button>
<button class="tb" data-cmd="formatBlock" data-val="blockquote"><i class="fas fa-quote-left"></i></button>
<button class="tb" data-act="hr"><i class="fas fa-minus"></i></button>
<div class="tb-sep"></div>
<button class="tb" data-act="img"><i class="fas fa-image"></i></button>
<button class="tb" data-act="link"><i class="fas fa-link"></i></button>
<button class="tb" data-act="code"><i class="fas fa-code"></i></button>
<button class="tb" data-act="table"><i class="fas fa-table"></i></button>
<div class="tb-sep"></div>
<button class="tb tb-accent" data-act="adslot"><i class="fas fa-rectangle-ad"></i></button>
<div class="tb-sep"></div>
<button class="tb" data-cmd="undo"><i class="fas fa-rotate-left"></i></button>
<button class="tb" data-cmd="redo"><i class="fas fa-rotate-right"></i></button>
</div>
<div class="ib" id="IB"><label id="IBLabel">URL</label><input id="IBInp" placeholder="https://..."><button class="ib-b ib-ok" id="IBOk" type="button">确认</button><button class="ib-b ib-no" id="IBNo" type="button">取消</button></div>
<div class="pb" id="PB"><i class="fas fa-code"></i><span style="flex:1">检测到代码，插入代码块？</span><button class="pb-b pb-y" id="PBY" type="button">插入</button><button class="pb-b pb-n" id="PBN" type="button">普通</button></div>
<div class="ew" id="EW"><div class="ed" id="editor" contenteditable="true"></div></div>
<div class="pw" id="PW"><div class="pv" id="preview"></div></div>
<div class="statbar"><span id="sC">0 字</span><span id="sR">~0分钟</span><span id="sS" style="margin-left:auto">已保存</span></div>
</div>

<div class="mo" id="MoRev"><div class="ml"><div class="mh"><h4>收益分成管理</h4><button class="mx" id="RevClose" type="button"><i class="fas fa-xmark"></i></button></div><div class="mb" id="RevBody"></div></div></div>
<div class="mo" id="MoEmbed"><div class="ml" style="max-width:520px"><div class="mh"><h4>生成嵌入代码</h4><button class="mx" id="EmbClose" type="button"><i class="fas fa-xmark"></i></button></div><div class="mb" id="EmbBody"></div></div></div>
<div class="mo" id="MoCfm"><div class="ml" style="max-width:340px"><div style="padding:20px;text-align:center" id="CfmBox"></div></div></div>
<div class="tc-w" id="TCW"></div>

<script>
document.addEventListener('DOMContentLoaded',function(){
var $=function(id){return document.getElementById(id)};
var editor=$('editor'),SB=$('SB'),Mask=$('SBMask'),Toggle=$('SBToggle');
var sbOpen=false,curId=null,mode='edit',ilType='',pendingPaste=null,saveTimer=null;
var curRole='admin',articles=[],auditLog=[];

var POS_MAP={'home-top':{l:'首页顶部',i:'fa-arrow-up'},'home-middle':{l:'首页中部',i:'fa-grip-lines'},'home-bottom':{l:'首页底部',i:'fa-arrow-down'},'detail-bottom':{l:'详情页底部',i:'fa-file-lines'},'feed-list':{l:'信息流',i:'fa-rss'},'profile':{l:'个人中心',i:'fa-user'},'search-result':{l:'搜索结果',i:'fa-magnifying-glass'}};
var SHARES=[{k:'wechat',l:'微信',i:'fa-brands fa-weixin',color:'#07c160'},{k:'weibo',l:'微博',i:'fa-brands fa-weibo',color:'#e6162d'},{k:'qq',l:'QQ',i:'fa-brands fa-qq',color:'#12b7f5'},{k:'link',l:'复制链接',i:'fa-link',color:'var(--accent2)'}];

function toast(m,t){t=t||'ok';var c=$('TCW');if(!c)return;var d=document.createElement('div');d.className='toast '+t;d.innerHTML='<i class="fas fa-'+(t==='ok'?'circle-check':t==='err'?'circle-xmark':'circle-info')+'"></i>'+m;c.appendChild(d);setTimeout(function(){d.style.opacity='0';d.style.transform='translateX(16px)';d.style.transition='all .15s'},1800);setTimeout(function(){if(d.parentNode)d.remove()},2000)}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';
function fn(n){n=Number(n)||0;return n>=10000?(n/10000).toFixed(1)+'万':n.toLocaleString()}

/* ===== 侧边栏 ===== */
function openSB(){sbOpen=true;SB.classList.add('open');Mask.classList.add('on');Toggle.classList.add('active')}
function closeSB(){sbOpen=false;SB.classList.remove('open');Mask.classList.remove('on');Toggle.classList.remove('active')}
function toggleSB(){sbOpen?closeSB():openSB()}
Toggle.addEventListener('click',toggleSB);
Mask.addEventListener('click',closeSB);

function selectAndLoad(id){
if(curId)autoSave();
curId=id;
var a=articles.find(function(x){return x.id===id});
if(!a)return;
editor.content=a.content||'';$('titleInp').value=a.title||'';
var ro=canEdit();editor.contentEditable=ro?'true':'false';editor.style.opacity=ro?'1':'.45';
$('titleInp').disabled=!ro;
renderList();closeSB();mode='edit';$('btnEdit').classList.add('on');$('btnPv').classList.remove('on');
$('EW').style.display='block';$('PW').style.display='none';updStats();
}

/* ===== 存储 ===== */
function save(){try{localStorage.setItem('afe_a2',JSON.stringify(articles));localStorage.setItem('afe_c2',curId||'')}catch(e){}}
function load(){try{articles=JSON.parse(localStorage.getItem('afe_a2'))||[];curId=parseInt(localStorage.getItem('afe_c2'))||null}catch(e){articles=[];curId=null}}
function autoSave(){clearTimeout(saveTimer);var s=$('sS');if(s)s.textContent='保存中...';saveTimer=setTimeout(function(){if(curId){var a=articles.find(function(x){return x.id===curId});if(a&&editor){a.content=editor.innerHTML;a.updateTime=Date.now()}}save();if(s)s.textContent='已保存';updStats()},500)}
function updStats(){var t=editor?editor.innerText||'';var c=t.replace(/\s/g,'').length;var c1=$('sC'),c2=$('sR');if(c1)c1.textContent=c+'字';if(c2)c2.textContent='~'+Math.max(1,Math.ceil(c/400))+'分钟阅读'}

/* ===== 权限 ===== */
function canEdit(){if(curRole==='admin')return true;var a=articles.find(function(x){return x.id===curId});if(!a)return false;if(curRole==='creator'&&a.owner===curUser())return true;return false}
function canDelete(){if(curRole==='admin')return true;return false}
function curUser(){var u=null;try{u=JSON.parse(localStorage.getItem('afe_u2'))}catch(e){}return u?u.u:'editor'}
function getShareData(artId){var a=articles.find(function(x){return x.id===artId});if(!a)return null;return a.share||{channels:{}}}

/* ===== 角色切换 ===== */
document.querySelectorAll('.role-btn').forEach(function(b){b.addEventListener('click',function(){curRole=this.getAttribute('data-role');document.querySelectorAll('.role-btn').forEach(function(x){x.classList.toggle('on',x.getAttribute('data-role')===curRole)});renderList();if(curId)selectAndLoad(curId);toast('切换为'+({admin:'管理员',creator:'创作者',sharer:'分享者'})[curRole],'inf')})});
$('searchInp').addEventListener('input',function(){renderList(this.value.trim())});

/* ===== 文章列表 ===== */
function renderList(kw){
var list=articles;if(kw){var k=kw.toLowerCase();list=list.filter(function(a){return(a.title||'').toLowerCase().includes(k)})}
if(curRole==='sharer'){list=list.filter(function(a){return(a.sharerStatus||'off')==='on'})}
$('sbFt').innerHTML=curRole==='admin'?'<button class="mbtn" style="width:100%;justify-content:center;display:flex;gap:5px" id="newBtn" type="button"><i class="fas fa-plus"></i> 新建</button>':'';
$('artList').innerHTML=list.length===0?'<div style="text-align:center;padding:24px 10px;color:var(--muted);font-size:10px"><i class="fas fa-file-lines" style="font-size:20px;display:block;margin-bottom:6px;opacity:.12"></i>'+(curRole==='sharer'?'暂无分享内容':'暂无文章')+'</div>':
list.map(function(a){
var ro=canEdit();
var stDot=a.status==='published'?'background:var(--accent2);box-shadow:0 0 4px var(--accent2)':a.status==='locked'?'background:var(--danger)':'background:var(--border)';
return '<div class="art-item'+(a.id===curId?' on':'')+'" data-aid="'+a.id+'">'+(!ro?'<i class="fas fa-lock" style="position:absolute;right:8px;top:10px;font-size:9px;color:var(--accent);opacity:.5"></i>':'<div class="ab" data-ab="'+a.id+'">'+(curRole==='admin'?'<button class="abtn" data-abt="menu" type="button"><i class="fas fa-ellipsis-vertical"></i></button>':'')+'</div>')+'<div class="at">'+esc(a.title||'无标题')+'</div><div class="ad"><span class="ptag ptag-'+a.owner+'">'+({admin:'管理员',creator:'创作者',sharer:'分享者'})[a.owner||'creator']+'</span><span>'+fmtT(a.updateTime)+'</span>'+(a.status==='published'?'<span style="color:var(--accent2)">·已发</span>':'')+'</div><div class="status-badge" style="width:5px;height:5px;border-radius:50%;'+stDot+'"></div></div>'
}).join('');
document.querySelectorAll('.art-item[data-aid]').forEach(function(el){el.addEventListener('click',function(e){if(e.target.closest('.ab'))return;selectAndLoad(Number(this.getAttribute('data-aid')))})});
document.querySelectorAll('.ab[data-ab]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var aid=Number(this.getAttribute('data-ab'));var abt=this.getAttribute('data-abt');if(abt==='menu')showPermMenu(aid,this)})});
var nb=$('newBtn');if(nb)nb.addEventListener('click',function(){if(curRole==='sharer'){toast('分享者无法创建','err');return}if(curId)autoSave();var a={id:Date.now(),title:'',content:'',owner:curRole,status:'draft',createTime:Date.now(),updateTime:Date.now(),share:{channels:{}};articles.unshift(a);curId=a.id;save();renderList();selectAndLoad(a.id);toast('已创建','ok')});
}
function fmtT(t){if(!t)return'';var d=new Date(t),df=Date.now()-d.getTime();if(df<60000)return'刚刚';if(df<3600000)return Math.floor(df/60000)+'分钟前';return(d.getMonth()+1)+'/'+d.getDate()}

/* ===== 权限菜单 ===== */
var activeMenu=null;
function showPermMenu(aid,btn){
if(activeMenu)activeMenu.remove();
var a=articles.find(function(x){return x.id===aid});if(!a)return;
var r=btn.getBoundingClientRect();
var m=document.createElement('div');m.className='pm';
var html='<div class="pm-i" data-pm="lock"><i class="fas fa-'+(a.status==='locked'?'lock-open':'lock')+'" style="color:'+(a.status==='locked'?'var(--accent2)':'var(--danger)')+'"></i><span class="pi-label">'+(a.status==='locked'?'解锁':'锁定')+'</span></div>';
if(a.owner!=='admin')html+='<div class="pm-i" data-pm="chown"><i class="fas fa-user-pen" style="color:var(--accent)"></i><span class="pi-label">转让所有权</span></div>';
if(a.status!=='published')html+='<div class="pm-i" data-pm="pub"><i class="fas fa-check-circle" style="color:var(--accent2)"></i><span class="pi-label">标记已发布</span></div>';
else html+='<div class="pm-i" data-pm="draft"><i class="fas fa-rotate-left" style="color:var(--muted)"></i><span class="pi-label">改回草稿</span></div>';
html+='<div class="pm-div"></div><div class="pm-i" data-pm="share"><i class="fas fa-share-nodes" style="color:var(--info)"></i><span class="pi-label">分享设置</span></div><div class="pm-i" data-pm="del" style="color:var(--danger)"><i class="fas fa-trash"></i><span class="pi-label" style="color:var(--danger)">删除</span></div>';
m.innerHTML=html;
var ml=r.left+window.scrollX;var mt=r.bottom+window.scrollY+document.querySelector('.main').offsetTop;
if(ml+140>window.innerWidth)m.style.left=(window.innerWidth-150)+'px';
m.style.top=Math.min(mt,window.innerHeight-200)+'px';
document.body.appendChild(m);activeMenu=m;
setTimeout(function(){m.addEventListener('click',function(e){var pm=e.target.closest('.pm-i');if(pm)handlePerm(aid,pm.getAttribute('data-pm'));if(!e.target.closest('.pm'))m.remove()})},10);
}
function handlePerm(aid,act){
if(activeMenu){activeMenu.remove();activeMenu=null}
var a=articles.find(function(x){return x.id===aid});if(!a)return;
switch(act){
case'lock':a.status=a.status==='locked'?'owner':'locked';save();toast(a.status==='locked'?'已锁定':'已解锁');break;
case'chown':a.owner=curRole;save();toast('已转让','ok');break;
case'pub':a.status='published';save();toast('已发布','ok');break;
case'draft':a.status='draft';save();toast('已改回草稿','inf');break;
case'share':showShareModal(aid);return;
case'del':confirmDel(aid);return;
}
renderList();if(curId===aid)selectAndLoad(aid);
}
function confirmDel(aid){var a=articles.find(function(x){return x.id===aid});if(!a)return;$('CfmBox').innerHTML='<div style="width:36px;height:36px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;background:var(--danger-bg);font-size:16px;color:var(--danger)"><i class="fas fa-trash"></i></div><h4 style="font-size:12px;font-weight:700">删除「'+esc(a.title||'无标题')+'」</h4><p style="font-size:10px;color:var(--muted);margin-bottom:14px">不可撤销</p><div style="display:flex;gap:6px;justify-content:center"><button class="btn btn-g" id="cfN" type="button">取消</button><button class="btn btn-d" id="cfY" type="button"><i class="fas fa-trash"></i> 删除</button></div>';$('MoCfm').classList.add('show');$('cfN').addEventListener('click',function(){$('MoCfm').classList.remove('show')});$('cfY').addEventListener('click',function(){articles=articles.filter(function(x){return x.id!==aid});if(curId===aid)curId=articles.length?articles[0].id:null;save();addLog('删除',a.title||'');$('MoCfm').classList.remove('show');toast('已删除');renderList();if(curId)selectAndLoad(curId)})}

/* ===== 编辑器命令 ===== */
function execCmd(cmd,val){editor.focus();document.execCommand(cmd,false,val||null);autoSave()}
$('toolbar').addEventListener('click',function(e){
var b=e.target.closest('.tb');if(!b)return;
var cmd=b.getAttribute('data-cmd');if(cmd){document.execCommand(cmd,false,b.getAttribute('data-val')||null);autoSave();return}
var act=b.getAttribute('data-act');if(act)handleToolbar(act);
});
function handleToolbar(a){
switch(a){
case'img':ilType='img';$('IBLabel').textContent='图片URL';$('IBInp').value='';$('IB').classList.add('show');setTimeout(function(){($IBInp||{}).focus()},30);break;
case'link':ilType='link';$('IBLabel').textContent='链接URL';$('IBInp').value='';$('IB').classList.add('show');setTimeout(function(){($IBInp||{}).focus()},30);break;
case'code':editor.focus();document.execCommand('insertHTML',false,'<div class="cw" contenteditable="false"><div class="cwh"><span>Code</span></div><pre contenteditable="true" style="outline:none"><code>// 代码\n</code></pre></div><p><br></p>');setTimeout(function(){editor.querySelectorAll('.cw pre').forEach(function(p){p.addEventListener('input',autoSave)})},20);autoSave();break;
case'table':editor.focus();document.execCommand('insertHTML',false,'<table style="width:100%;border-collapse:collapse;margin:10px 0"><tr><th style="border:1px solid var(--border);padding:6px;text-align:left;background:rgba(255,255,255,.02)">列1</th><th style="border:1px solid var(--border);padding:6px;text-align:left;background:rgba(255,255,255,.02)">列2</th></tr><tr><td style="border:1px solid var(--border);padding:6px">内容</td><td style="border:1px solid var(--border);padding:6px">内容</td></tr><tr><td style="border:1px solid var(--border);padding:6px">内容</td><td style="border:1px solid var(--border);padding:6px">内容</td></tr></table><p><br></p>');autoSave();break;
case'hr':editor.focus();document.execCommand('insertHTML',false,'<hr><p><br></p>');autoSave();break;
case'adslot':openSlotModal();break;
}}
$('IBOk').addEventListener('click',cfIB);$('IBNo').addEventListener('click',function(){$('IB').classList.remove('show')});$('IBInp').addEventListener('keydown',function(e){if(e.key==='Enter')cfIB()});
function cfIB(){var v=$('IBInp').value.trim();if(!v){toast('请输入URL','err');return}editor.focus();if(ilType==='img')document.execCommand('insertHTML',false,'<img src="'+esc(v)+'" alt="">');else{var sel=window.getSelection();document.execCommand('insertHTML',false,'<a href="'+esc(v)+'" target="_blank">'+esc(sel.toString()||'链接')+'</a>')}$('IB').classList.remove('show');autoSave()}
editor.addEventListener('paste',function(e){var text=(e.clipboardData||window.clipboardData).getData('text/plain');if(!text||!text.includes('\n'))return;if(['{','}',';','=>','function','const','let','var','import','//','/*'].filter(function(s){return text.includes(s)}).length>=2){e.preventDefault();pendingPaste=text;$('PB').classList.add('show')}});
$('PBY').addEventListener('click',function(){$('PB').classList.remove('show');if(pendingPaste){editor.focus();document.execCommand('insertHTML',false,'<div class="cw" contenteditable="false"><div class="cwh"><span>Code</span></div><pre contenteditable="true" style="outline:none"><code>'+esc(pendingPaste)+'</code></pre></div><p><br></p>');pendingPaste=null;toast('已插入代码块','ok');setTimeout(function(){editor.querySelectorAll('.cw pre').forEach(function(p){p.addEventListener('input',autoSave)})},20);autoSave()}});
$('PBN').addEventListener('click',function(){$('PB').classList.remove('show');if(pendingPaste){editor.focus();document.execCommand('insertText',false,pendingPaste);pendingPaste=null}});
editor.addEventListener('input',autoSave);editor.addEventListener('keydown',function(e){if(e.key==='Tab'){var sel=window.getSelection();if(sel.anchorNode&&sel.anchorNode.closest&&sel.anchorNode.closest('.cw pre')){e.preventDefault();document.execCommand('insertText',false,'  ')}}
if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();e.shiftKey?execCmd('redo'):execCmd('undo')}});
$('titleInp').addEventListener('input',function(){if(!canEdit())return;var a=articles.find(function(x){return x.id===curId});if(a){a.title=this.value;a.updateTime=Date.now()}autoSave();renderList()});
$('btnEdit').addEventListener('click',function(){mode='edit';this.classList.add('on');$('btnPv').classList.remove('on');$('EW').style.display='block';$('PW').style.display='none'});
$('btnPv').addEventListener('click',function(){mode='preview';this.classList.add('on');$('btnEdit').classList.remove('on');$('EW').style.display='none';$('PW').style.display='block';renderPV()});
$('pubBtn').addEventListener('click',pubArt);
$('revBtn').addEventListener('click',showRevModal);
$('embedBtn').addEventListener('click',showEmbedModal);

/* ===== 广告位 ===== */
function openSlotModal(){
var ad=[];try{ad=JSON.parse(localStorage.getItem('adforge_ads'))||[]}catch(e){ad=[]}
var act=ad.filter(function(a){return a.status==='active'});
var m=document.createElement('div');m.className='mo';m.id='SlotMo';
m.innerHTML='<div class="ml" style="max-width:360px"><div class="mh"><h4>插入广告位</h4><button class="mx" type="button" id="SlotClose"><i class="fas fa-xmark"></i></button></div><div class="mb">'+Object.entries(POS_MAP).map(function(e){return'<div class="si" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:4px;transition:all .1px" data-slot="'+e[0]+'"><i class="fas '+e[1].i+'" style="color:var(--warn);font-size:11px;width:14px;text-align:center"></i><span style="flex:1;font-size:10px;font-weight:600">'+e[1].l+'</span><span style="font-size:8px;color:var(--muted)">'+act.filter(function(a){return a.position===e[0]}).length+'个</span></div>'}).join('')+'</div></div>';
$('body').appendChild(m);m.classList.add('show');
$('SlotClose').addEventListener('click',function(){m.classList.remove('show')});
m.addEventListener('click',function(e){if(e.target===m)return;
var s=e.target.closest('[data-slot]');if(!s)return;var pos=s.getAttribute('data-slot');
editor.focus();document.execCommand('insertHTML',false,'<div class="ad-ph" contenteditable="false" data-ad-pos="'+pos+'"><div class="ad-ph-icon"><i class="fas fa-rectangle-ad"></i></div><div class="ad-ph-info"><div class="ad-ph-label">广告位 · '+(POS_MAP[pos]?POS_MAP[pos].l:pos)+'</div><div class="ad-ph-desc">预览时自动匹配</div></div></div><p><br></p>');
m.classList.remove('show');autoSave();updStats()});

/* ===== 预览 ===== */
function renderPV(){
var html=editor.innerHTML;var ad=[];try{ad=JSON.parse(localStorage.getItem('adforge_ads'))||[]}catch(e){ad=[]}
var act=ad.filter(function(a){return a.status==='active'});
html=html.replace(/<div class="ad-ph"[^>]*data-ad-pos="([^"]*)"[^>]*>[\s\S]*?<\/div>/g,function(m,pos){
var mt=act.filter(function(a){return a.position===pos});
if(mt.length){var a=mt[Math.floor(Math.random()*mt.length)];return'<div class="ad-render"><img src="'+esc(a.image||'')+'" alt="'+esc(a.name||'')+'"><div class="ad-label">广告</div></div>'}
return'<div class="ad-empty"><i class="fas fa-rectangle-ad" style="font-size:16px;display:block;margin-bottom:4px;opacity:.15"></i>'+(POS_MAP[pos]?POS_MAP[pos].l:pos)+'<span style="font-size:9px;display:block;margin-top:2px">暂无匹配广告</span></div>';
});
html=html.replace(/<div class="cw"[^>]*>[\s\S]*?<\/div>/g,function(m,code){return'<pre style="margin:10px 0;border-radius:6px;padding:10px;background:var(--codebg);overflow-x:auto;border:1px solid var(--border)"><code style="font-family:monospace;font-size:11px;color:#7dd3fc;line-height:1.5">'+m+'</code></pre>'});
html=html.replace(/contenteditable="[^"]*"/g,'');
$('preview').innerHTML='<h1>'+esc(curId?((articles.find(function(x){return x.id===curId})||{}).title||'无标题':'')+'</h1>'+html;
}

/* ===== 发布 ===== */
function pubArt(){if(!curId||!editor.innerHTML.trim()){toast('内容为空','err');return}
var content=editor.innerHTML;
content=content.replace(/<div class="ad-ph"[^>]*data-ad-pos="([^"]*)"[^>]*>[\s\S]*?<\/div>/g,function(m,pos){return'<div data-ad-pos="'+pos+'" style="max-width:728px;margin:14px auto"></div>'});
content=content.replace(/contenteditable="[^"]*"/g,'');
content=content.replace(/<div class="cw"[^>]*>[\s\S]*?<\/div>/g,function(){return'<pre style="margin:10px 0;border-radius:6px;padding:10px;background:#0a0d16;overflow-x:auto;border:1px solid #1e293b"><code style="font-family:monospace;font-size:14px;color:#7dd3fc;line-height:1.6">代码块</code></pre>'});
var title=curId?((articles.find(function(x){return x.id===curId})||{}).title:'无标题');
var date=new Date((articles.find(function(x){return x.id===curId})||{}).createTime||Date.now()).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
var slots=(content.match(/data-ad-pos="([^"]*)"/g)||[]).map(function(s){return s.replace(/data-ad-pos="|"$/g,'')});

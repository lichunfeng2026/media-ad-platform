<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>聚媒通 · 自媒体广告投放平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --pri: #0d9488;
      --pri-l: #14b8a6;
      --pri-d: #0f766e;
      --acc: #f59e0b;
      --err: #ef4444;
      --ok: #22c55e;
      --warn: #f59e0b;
      --info: #06b6d4;
      --sb: #0f172a;
      --bg: #f1f5f9;
      --card: #ffffff;
      --tx: #1e293b;
      --tx2: #64748b;
      --bd: #e2e8f0;
      --r: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
    }
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--tx);
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    input, select, textarea, button {
      font-family: inherit;
    }

    /* 认证页面 */
    .auth {
      display: none;
      width: 100%;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d4f4f 100%);
      position: relative;
      overflow-y: auto;
    }
    .auth.on {
      display: flex;
    }
    .auth .bg {
      position: absolute;
      border-radius: 50%;
      opacity: 0.06;
      background: var(--pri);
    }
    .auth .bg:nth-child(1) {
      width: 500px;
      height: 500px;
      top: -150px;
      right: -100px;
    }
    .auth .bg:nth-child(2) {
      width: 350px;
      height: 350px;
      bottom: -100px;
      left: -80px;
    }
    .abox {
      width: 440px;
      max-width: 94%;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 18px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
      position: relative;
      z-index: 2;
      overflow: hidden;
    }
    .abox .hd {
      padding: 32px 28px;
      text-align: center;
      background: linear-gradient(135deg, var(--pri), var(--pri-d));
      color: #fff;
    }
    .abox .hd .ico {
      font-size: 2.6rem;
      margin-bottom: 10px;
    }
    .abox .hd h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .abox .hd p {
      opacity: 0.85;
      font-size: 0.9rem;
      margin-top: 6px;
    }
    .abox .bd {
      padding: 30px 28px;
    }
    .fg {
      margin-bottom: 18px;
    }
    .fl {
      display: block;
      font-weight: 600;
      color: var(--tx);
      margin-bottom: 6px;
      font-size: 0.88rem;
    }
    .fi {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: 0.94rem;
      transition: all 0.2s;
      background: #fff;
    }
    .fi:focus {
      border-color: var(--pri);
      outline: none;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
    }
    .fiw {
      position: relative;
    }
    .fiw i.l {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--tx2);
    }
    .fiw .fi {
      padding-left: 40px;
    }
    .fiw .tp {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--tx2);
      cursor: pointer;
    }
    .abtn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .abtn:hover {
      transform: translateY(-1px);
    }
    .abtn-p {
      background: var(--pri);
      color: #fff;
    }
    .abtn-p:hover {
      background: var(--pri-d);
      box-shadow: 0 6px 16px rgba(13, 148, 136, 0.3);
    }
    .abtn-s {
      background: var(--ok);
      color: #fff;
    }
    .frow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      font-size: 0.85rem;
    }
    .frow label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--tx2);
      cursor: pointer;
    }
    .frow a {
      color: var(--pri);
      text-decoration: none;
      font-weight: 600;
    }
    .abox .ft {
      padding: 16px 28px;
      text-align: center;
      border-top: 1px solid var(--bd);
      font-size: 0.88rem;
      color: var(--tx2);
      background: #f8fafc;
    }
    .abox .ft a {
      color: var(--pri);
      text-decoration: none;
      font-weight: 600;
    }
    .pws {
      height: 5px;
      background: #e2e8f0;
      border-radius: 4px;
      margin-top: 6px;
      overflow: hidden;
    }
    .pws .bar {
      height: 100%;
      width: 0;
      transition: all 0.3s;
      border-radius: 4px;
    }
    .pws .txt {
      font-size: 0.75rem;
      margin-top: 3px;
      color: var(--tx2);
    }

    /* 主框架 */
    .app {
      display: none;
      height: 100vh;
      flex-direction: row;
    }
    .app.on {
      display: flex;
    }
    .sb {
      width: 260px;
      min-width: 260px;
      background: var(--sb);
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: all 0.3s;
      z-index: 100;
    }
    .sb-hd {
      padding: 22px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .sb-logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--pri), var(--pri-l));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 900;
      flex-shrink: 0;
    }
    .sb-brand {
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .sb-brand small {
      display: block;
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.35);
      font-weight: 400;
    }
    .sb-user {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .sb-av {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pri), var(--acc));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .sb-nm {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .sb-rl {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.45);
      background: rgba(13, 148, 136, 0.25);
      padding: 2px 8px;
      border-radius: 12px;
      display: inline-block;
      margin-top: 3px;
    }
    .sb-nav {
      flex: 1;
      padding: 12px 0;
      overflow-y: auto;
    }
    .ns {
      padding: 8px 18px 6px;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 1.8px;
      font-weight: 700;
    }
    .ni {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 18px;
      color: rgba(255, 255, 255, 0.55);
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
      font-size: 0.9rem;
      position: relative;
    }
    .ni:hover {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.9);
    }
    .ni.on {
      background: rgba(13, 148, 136, 0.15);
      color: var(--pri-l);
      border-left-color: var(--pri-l);
    }
    .ni i {
      width: 20px;
      text-align: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .nb {
      position: absolute;
      right: 16px;
      background: var(--err);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 12px;
      font-weight: 700;
    }
    .sb-ft {
      padding: 14px 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .lo-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 0.9rem;
    }
    .lo-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .top {
      height: 60px;
      background: var(--card);
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .top-l {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mmenu {
      display: none;
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--tx);
      cursor: pointer;
    }
    .ptitle {
      font-size: 1.15rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-r {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }
    .nbtn {
      position: relative;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: var(--tx2);
      cursor: pointer;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nbtn:hover {
      background: #f1f5f9;
      color: var(--tx);
    }
    .nbdg {
      position: absolute;
      top: 2px;
      right: 2px;
      background: var(--err);
      color: #fff;
      font-size: 0.6rem;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }
    .tav {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pri), var(--acc));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .cnt {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* 通知面板 */
    .npnl {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 370px;
      max-height: 420px;
      overflow-y: auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.15);
      z-index: 2000;
      border: 1px solid var(--bd);
    }
    .npnl.on {
      display: block;
    }
    .npnl-h {
      padding: 14px 18px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: #fff;
      border-radius: 12px 12px 0 0;
    }
    .npnl-h strong {
      font-size: 0.95rem;
    }
    .npnl-h button {
      background: none;
      border: none;
      color: var(--pri);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .ni2 {
      padding: 12px 18px;
      border-bottom: 1px solid #f8fafc;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .ni2:hover {
      background: #f8fafc;
    }
    .ni2.ur {
      background: #f0fdfa;
    }
    .ndot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pri);
      flex-shrink: 0;
      margin-top: 5px;
    }
    .ndot.rd {
      background: transparent;
    }
    .ntx b {
      font-size: 0.85rem;
      display: block;
    }
    .ntx p {
      font-size: 0.78rem;
      color: var(--tx2);
      margin-top: 2px;
    }
    .ntx small {
      font-size: 0.7rem;
      color: #94a3b8;
      display: block;
      margin-top: 3px;
    }
    .npnl-f {
      padding: 10px;
      text-align: center;
      border-top: 1px solid var(--bd);
      position: sticky;
      bottom: 0;
      background: #fff;
      border-radius: 0 0 12px 12px;
    }
    .npnl-f a {
      color: var(--pri);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* 通用组件 */
    .cd {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      border: 1px solid var(--bd);
      margin-bottom: 20px;
    }
    .cd-h {
      padding: 16px 20px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cd-h h3 {
      font-size: 1rem;
      font-weight: 700;
    }
    .cd-b {
      padding: 20px;
    }
    .sg {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .sc {
      background: var(--card);
      border-radius: var(--r);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--bd);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s;
    }
    .sc:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .si {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .sv {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .sl {
      font-size: 0.8rem;
      color: var(--tx2);
      margin-top: 2px;
    }
    .tb {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .inp,
    .sel {
      padding: 9px 14px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: 0.9rem;
      background: #fff;
      transition: all 0.2s;
    }
    .inp:focus,
    .sel:focus {
      border-color: var(--pri);
      outline: none;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.08);
    }
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover {
      transform: translateY(-1px);
    }
    .bp {
      background: var(--pri);
      color: #fff;
    }
    .bp:hover {
      background: var(--pri-d);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.25);
    }
    .bs {
      background: var(--ok);
      color: #fff;
    }
    .bd {
      background: var(--err);
      color: #fff;
    }
    .bg {
      background: transparent;
      border: 1.5px solid var(--bd);
      color: var(--tx2);
    }
    .bg:hover {
      background: #f8fafc;
    }
    .bsm {
      padding: 5px 12px;
      font-size: 0.8rem;
      border-radius: 6px;
    }
    .badge {
      padding: 3px 10px;
      border-radius: 14px;
      font-size: 0.73rem;
      font-weight: 700;
      display: inline-block;
    }
    .b-ok {
      background: rgba(34, 197, 94, 0.1);
      color: var(--ok);
    }
    .b-wr {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warn);
    }
    .b-er {
      background: rgba(239, 68, 68, 0.1);
      color: var(--err);
    }
    .b-in {
      background: rgba(6, 182, 212, 0.1);
      color: var(--info);
    }
    .tw {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f8fafc;
      padding: 11px 16px;
      text-align: left;
      font-weight: 700;
      font-size: 0.78rem;
      color: var(--tx2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--bd);
    }
    td {
      padding: 11px 16px;
      border-bottom: 1px solid #f8fafc;
      font-size: 0.9rem;
    }
    tr:hover td {
      background: #f8fafc;
    }

    /* 模态框 */
    .mdl {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      z-index: 3000;
      align-items: flex-start;
      justify-content: center;
      padding: 30px 16px;
      overflow-y: auto;
      backdrop-filter: blur(4px);
    }
    .mdl.on {
      display: flex;
    }
    .mbox {
      background: #fff;
      border-radius: 14px;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
      margin: auto;
      animation: mi 0.2s ease;
    }
    @keyframes mi {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }
    .mbox.lg {
      max-width: 960px;
    }
    .mbox.sm {
      max-width: 460px;
    }
    .mh {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--bd);
    }
    .mh h3 {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .mc {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--tx2);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mc:hover {
      background: #f1f5f9;
      color: var(--tx);
    }
    .mb {
      padding: 24px;
    }
    .mf {
      padding: 14px 24px;
      border-top: 1px solid var(--bd);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* 表单 */
    .fg2 {
      margin-bottom: 16px;
    }
    .fl2 {
      display: block;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--tx);
      margin-bottom: 5px;
    }
    .fi2 {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.2s;
      background: #fff;
    }
    .fi2:focus {
      border-color: var(--pri);
      outline: none;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.08);
    }
    .fr {
      display: flex;
      gap: 14px;
    }
    .fr>.fg2 {
      flex: 1;
    }

    /* 富媒体编辑器 */
    .edtb {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px;
      background: #f8fafc;
      border: 1px solid var(--bd);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
    }
    .eb {
      background: #fff;
      border: 1px solid var(--bd);
      border-radius: 5px;
      padding: 6px 9px;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--tx);
      transition: all 0.1s;
    }
    .eb:hover {
      background: #e2e8f0;
    }
    .erea {
      min-height: 200px;
      border: 1px solid var(--bd);
      border-radius: 0 0 8px 8px;
      padding: 14px;
      background: #fff;
      outline: none;
      line-height: 1.7;
    }
    .erea:focus {
      border-color: var(--pri);
    }

    /* 平台选择 */
    .plat-sel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .plat-tag {
      padding: 6px 14px;
      border: 1.5px solid var(--bd);
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .plat-tag.sel {
      background: var(--pri);
      color: #fff;
      border-color: var(--pri);
    }

    /* 分享 */
    .spnl {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .sb2 {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      transition: all 0.2s;
    }
    .sb2:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }
    .sb-wx {
      background: #07c160;
    }
    .sb-wb {
      background: #e6162d;
    }
    .sb-qq {
      background: #12b7f5;
    }
    .sb-cp {
      background: var(--pri);
    }

    .pg {
      display: none;
    }
    .pg.on {
      display: block;
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }
    .tag-item {
      background: #e0f2f1;
      color: var(--pri-d);
      padding: 4px 10px;
      border-radius: 14px;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tag-item i {
      cursor: pointer;
      opacity: 0.6;
    }
    .tag-item i:hover {
      opacity: 1;
    }

    @media(max-width:768px) {
      .sb {
        position: fixed;
        left: -270px;
        z-index: 500;
      }
      .sb.mson {
        left: 0;
      }
      .mmenu {
        display: flex;
      }
      .sbov {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 400;
      }
      .sbov.on {
        display: block;
      }
      .fr {
        flex-direction: column;
      }
      .sg {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <!-- 模态框：文章编辑 -->
  <div class="mdl" id="mdlArtEd">
    <div class="mbox lg"><div class="mh"><h3 id="artEdTitle">创作文章</h3><button class="mc" onclick="clsMdl('mdlArtEd')"><i class="fas fa-times"></i></button></div>
      <div class="mb">
        <div class="fg2"><label class="fl2">文章标题</label><input class="fi2" id="artTitle" placeholder="请输入文章标题"></div>
        <div class="fr"><div class="fg2"><label class="fl2">分类</label><select class="fi2" id="artCat"><option>运营</option><option>广告</option><option>营销</option><option>科技</option><option>生活</option></select></div><div class="fg2"><label class="fl2">发布平台</label><div class="plat-sel" id="platContainer"></div></div></div>
        <div class="fg2"><label class="fl2">标签</label><div style="display:flex;gap:8px;"><input class="fi2" id="tagInput" placeholder="输入标签后回车" onkeydown="if(event.key==='Enter'){addTag();event.preventDefault();}"><button class="btn bg" onclick="addTag()">添加</button></div><div class="tag-list" id="tagList"></div></div>
        <div class="fg2"><label class="fl2">富媒体编辑器</label>
          <div class="edtb">
            <button class="eb" onclick="execCmd('bold')"><i class="fas fa-bold"></i></button>
            <button class="eb" onclick="execCmd('italic')"><i class="fas fa-italic"></i></button>
            <button class="eb" onclick="execCmd('underline')"><i class="fas fa-underline"></i></button>
            <button class="eb" onclick="execCmd('strikeThrough')"><i class="fas fa-strikethrough"></i></button>
            <button class="eb" onclick="execCmd('justifyLeft')"><i class="fas fa-align-left"></i></button>
            <button class="eb" onclick="execCmd('justifyCenter')"><i class="fas fa-align-center"></i></button>
            <button class="eb" onclick="execCmd('insertUnorderedList')"><i class="fas fa-list-ul"></i></button>
            <button class="eb" onclick="execCmd('insertOrderedList')"><i class="fas fa-list-ol"></i></button>
            <button class="eb" onclick="insertLink()"><i class="fas fa-link"></i></button>
            <button class="eb" onclick="insertImage()"><i class="fas fa-image"></i></button>
            <button class="eb" onclick="insertVideo()"><i class="fas fa-video"></i></button>

            <button class="eb" onclick="insertCode()"><i class="fas fa-code"></i></button>
            <input type="color" class="eb" style="width:34px;height:34px;padding:3px;" onchange="execCmd('foreColor',this.value)" title="文字颜色">
            <select class="eb" onchange="execCmd('fontSize',this.value)" title="字号"><option value="1">小</option><option value="3" selected>中</option><option value="5">大</option><option value="7">特大</option></select>

  <div class="mdl" id="mdlAdEd">

        <div class="fg2"><label>形式</label><select class="fi2" id="adForm"><option>静态横幅</option><option>动态跳转</option><option>弹窗</option><option>侧边悬浮</option></select></div>

  <!-- 模态框：分享 -->
  <div class="mdl" id="mdlShare">
    <div class="mbox sm"><div class="mh"><h3>分享文章</h3><button class="mc" onclick="clsMdl('mdlShare')"><i class="fas fa-times"></i></button></div>
      <div class="mb">
        <p style="margin-bottom:14px;color:var(--tx2);">分享到以下平台可获取收益</p>
        <div class="spnl">
          <button class="sb2 sb-wx" onclick="doShare('微信')"><i class="fab fa-weixin"></i> 微信</button>
          <button class="sb2 sb-wb" onclick="doShare('微博')"><i class="fab fa-weibo"></i> 微博</button>
          <button class="sb2 sb-qq" onclick="doShare('QQ')"><i class="fab fa-qq"></i> QQ</button>
          <button class="sb2 sb-cp" onclick="doShare('复制链接')"><i class="fas fa-link"></i> 复制链接</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" style="display:none;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 28px;border-radius:24px;font-size:0.9rem;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.2);"></div>

  <script>
    const platforms = ['微信', '朋友圈', '头条', '知乎', '抖音', '快手', '小红书', 'QQ', '微博', '百家号', '公众号', '企鹅号', '网站'];
    let notifications = [
      { id: 1, title: '文章《自媒体运营技巧》发布成功', desc: '已同步到微信公众号、头条号', time: '10分钟前', unread: true },
      { id: 2, title: '广告收益到账 ¥580', desc: '横幅广告「某某教育」今日收益', time: '30分钟前', unread: true },
      { id: 3, title: '新用户「周七」注册', desc: '来源：微信分享链接', time: '1小时前', unread: true },
      { id: 4, title: '分享到微信群，获得 ¥45 收益', desc: '文章：短视频变现策略', time: '2小时前', unread: true },
      { id: 5, title: '广告主「某某品牌」提交投放申请', desc: '预算 ¥2000，投放7天', time: '3小时前', unread: true }
    ];

    function renderNotifications() {
      const nList = document.getElementById('nList');
      nList.innerHTML = notifications.map(n => `
        <div class="ni2 ${n.unread ? 'ur' : ''}" data-nid="${n.id}">
          <div class="ndot ${n.unread ? '' : 'rd'}"></div>
          <div class="ntx"><b>${n.title}</b><p>${n.desc}</p><small>${n.time}</small></div>
        </div>`).join('');
      const unreadCount = notifications.filter(n => n.unread).length;
      const badge = document.getElementById('nBdg');
      badge.textContent = unreadCount;
      badge.style.display = unreadCount > 0 ? 'flex' : 'none';
    }

    function addNotification(title, desc) {
      notifications.unshift({ id: Date.now(), title, desc, time: '刚刚', unread: true });
      renderNotifications();
      toast(title, 'info');
    }

    function renderPlatSelector() {
      const container = document.getElementById('platContainer');
      container.innerHTML = platforms.map(p => `<span class="plat-tag" data-plat="${p}" onclick="togglePlat(this)">${p}</span>`).join('');
    }

    function togglePlat(el) { el.classList.toggle('sel'); }

    function getSelectedPlatforms() {
      return [...document.querySelectorAll('#platContainer .plat-tag.sel')].map(el => el.dataset.plat);
    }

    let articleTags = [];

    function addTag() {
      const input = document.getElementById('tagInput');
      const val = input.value.trim();
      if (val && !articleTags.includes(val)) {
        articleTags.push(val);
        renderTags();
      }
      input.value = '';
    }

    function renderTags() {
      document.getElementById('tagList').innerHTML = articleTags.map(t => `<span class="tag-item">${t} <i class="fas fa-times" onclick="removeTag('${t}')"></i></span>`).join('');
    }

    function removeTag(tag) {
      articleTags = articleTags.filter(t => t !== tag);
      renderTags();
    }

    function execCmd(cmd, value = null) {
      document.execCommand(cmd, false, value);
      document.getElementById('artContent').focus();
    }

    function insertLink() { const url = prompt('输入链接地址:', 'https://'); if (url) execCmd('createLink', url); }

    function insertImage() { const url = prompt('输入图片URL:', 'https://'); if (url) execCmd('insertImage', url); }

    function insertVideo() { const url = prompt('输入视频嵌入代码或URL:', 'https://'); if (url) document.execCommand('insertHTML', false, `<div style="background:#f1f5f9;padding:20px;text-align:center;border:1px dashed #ccc;">🎬 视频: ${url}</div>`); }

    function insertTable() { document.execCommand('insertHTML', false, '<table border="1" style="width:100%;border-collapse:collapse;"><tr><td>单元格1</td><td>单元格2</td></tr><tr><td>单元格3</td><td>单元格4</td></tr></table>'); }

    function insertCode() { const code = prompt('输入代码片段:', 'console.log("hello");'); if (code) document.execCommand('insertHTML', false, `<pre style="background:#1e293b;color:#fff;padding:10px;border-radius:6px;"><code>${code}</code></pre>`); }

    function insertAdPlaceholder() { document.execCommand('insertHTML', false, `<div style="background:#fff3cd;border:1px dashed #f59e0b;padding:8px;margin:10px 0;text-align:center;font-weight:bold;">📢 广告位 (待投放)</div>`); }

    function openArtEd() {
      document.getElementById('artEdTitle').textContent = '创作文章';
      document.getElementById('artTitle').value = '';
      document.getElementById('artContent').innerHTML = '<p>开始撰写文章...</p>';
      articleTags = [];
      renderTags();
      renderPlatSelector();
      document.getElementById('mdlArtEd').classList.add('on');
    }

    function saveArticle() {
      const title = document.getElementById('artTitle').value.trim();
      if (!title) return toast('请输入文章标题', 'warn');
      clsMdl('mdlArtEd');
      addNotification(`文章《${title}》已保存为草稿`, '');
    }

    function publishArticle() {
      const title = document.getElementById('artTitle').value.trim();
      const plats = getSelectedPlatforms();
      if (!title) return toast('请输入文章标题', 'warn');
      if (plats.length === 0) return toast('请至少选择一个发布平台', 'warn');
      clsMdl('mdlArtEd');
      addNotification(`文章《${title}》已发布到 ${plats.join('、')}`, '');
    }

    function openFetchModal() { document.getElementById('mdlFetch').classList.add('on'); }

    function fetchArticle() {
      const input = document.getElementById('fetchInput').value.trim();
      if (!input) return toast('请输入URL或关键词', 'warn');
      clsMdl('mdlFetch');
      setTimeout(() => {
        openArtEd();
        document.getElementById('artTitle').value = '抓取：' + input.substring(0, 20);
        document.getElementById('artContent').innerHTML = '<p>已抓取内容并导入编辑器，您可以继续编辑。</p>';
        toast('文章抓取成功，已导入编辑器', 'ok');
      }, 600);
    }

    function openAdEd() { document.getElementById('mdlAdEd').classList.add('on'); }

    function createAd() {
      const name = document.getElementById('adName').value.trim();
      if (!name) return toast('请输入广告名称', 'warn');
      clsMdl('mdlAdEd');
      addNotification(`广告「${name}」已创建并提交审核`, '');
    }

    function openShareModal() { document.getElementById('mdlShare').classList.add('on'); }

    function doShare(platform) {
      clsMdl('mdlShare');
      const earn = (Math.random() * 80 + 20).toFixed(2);
      addNotification(`分享到${platform}，预计收益 ¥${earn}`, '');
    }

    function swAuth(page) {
      document.querySelectorAll('.auth').forEach(el => el.classList.remove('on'));
      document.getElementById('pg' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('on');
    }

    function doLogin() {
      const u = document.getElementById('lgU').value.trim(),
        p = document.getElementById('lgP').value.trim();
      if (!u || !p) return toast('请输入账号和密码', 'err');
      document.querySelectorAll('.auth').forEach(el => el.classList.remove('on'));
      document.getElementById('appMain').classList.add('on');
      buildPages();
      initDashboardCharts();
      renderNotifications();
      toast('登录成功，欢迎回来！', 'ok');
    }

    function doLogout() {
      document.getElementById('appMain').classList.remove('on');
      document.getElementById('pgLogin').classList.add('on');
      toast('已安全退出', 'info');
    }

    function doReg() {
      const u = document.getElementById('rgU').value.trim(),
        ph = document.getElementById('rgPh').value.trim(),
        p1 = document.getElementById('rgP1').value,
        p2 = document.getElementById('rgP2').value;
      if (!u || !ph || !p1 || !p2) return toast('请填写所有必填项', 'err');
      if (p1.length < 6) return toast('密码至少6位', 'err');
      if (p1 !== p2) return toast('两次密码不一致', 'err');
      toast('注册成功！请登录', 'ok');
      swAuth('login');
    }

    function doReset() { toast('密码重置成功', 'ok');
      swAuth('login'); }

    function sndCode() { toast('验证码已发送', 'info'); }

    function chkPw(v) {
      const bar = document.getElementById('pwBar');
      const txt = document.getElementById('pwTxt');
      let strength = 0;
      if (v.length >= 6) strength++;
      if (/[a-z]/.test(v) && /[A-Z]/.test(v)) strength++;
      if (/\d/.test(v)) strength++;
      if (/[^a-zA-Z0-9]/.test(v)) strength++;
      const colors = ['#ef4444', '#f59e0b', '#22c55e', '#0d9488'];
      const labels = ['弱', '一般', '强', '很强'];
      bar.style.width = (strength / 4 * 100) + '%';
      bar.style.background = colors[strength - 1] || '#ef4444';
      txt.textContent = labels[strength - 1] || '弱';
    }

    function togPw(btn) {
      const input = btn.parentElement.querySelector('input');
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function togNp() { document.getElementById('nPnl').classList.toggle('on'); }

    function clrNp() { notifications.forEach(n => n.unread = false);
      renderNotifications();
      toast('全部已读', 'info'); }

    function togSb() { document.getElementById('sb').classList.toggle('mson');
      document.getElementById('sbOv').classList.toggle('on'); }

    function clsSb() { document.getElementById('sb').classList.remove('mson');
      document.getElementById('sbOv').classList.remove('on'); }

    function clsMdl(id) { document.getElementById(id).classList.remove('on'); }

    function toast(msg, type = 'info') {
      const el = document.getElementById('toast');
      el.style.background = type === 'ok' ? '#22c55e' : type === 'err' ? '#ef4444' : type === 'warn' ? '#f59e0b' : '#1e293b';
      el.textContent = msg;
      el.style.display = 'block';
      clearTimeout(el._timeout);
      el._timeout = setTimeout(() => { el.style.display = 'none'; }, 2500);
    }

    const pageTitles = { dashboard: '工作台', articles: '文章管理', ads: '广告管理', analytics: '数据分析', income: '收益中心', users: '用户管理', data: '数据管理', settings: '系统设置', profile: '个人中心' };
    const pageIcons = { dashboard: 'fa-th-large', articles: 'fa-file-alt', ads: 'fa-ad', analytics: 'fa-chart-line', income: 'fa-wallet', users: 'fa-users-cog', data: 'fa-database', settings: 'fa-cog', profile: 'fa-user-circle' };

    function nav(page) {
      document.querySelectorAll('.ni').forEach(el => el.classList.remove('on'));
      const navItem = document.querySelector(`.ni[data-p="${page}"]`);
      if (navItem) navItem.classList.add('on');
      document.getElementById('pgT').innerHTML = `<i class="fas ${pageIcons[page]}"></i> ${pageTitles[page]}`;
      document.querySelectorAll('.pg').forEach(el => el.classList.remove('on'));
      const pg = document.getElementById('pg-' + page);
      if (pg) pg.classList.add('on');
      document.getElementById('sb').classList.remove('mson');
      document.getElementById('sbOv').classList.remove('on');
      if (page === 'dashboard') initDashboardCharts();
      if (page === 'analytics') initAnalyticsCharts();
    }

    function initDashboardCharts() {
      const ctx = document.getElementById('chInc');
      if (ctx && !ctx._chart) {
        ctx._chart = new Chart(ctx, { type: 'line', data: { labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'], datasets: [{ label: '收益 (¥)', data: [4200, 3800, 5100, 4600, 5800, 6200, 5500], borderColor: '#0d9488', backgroundColor: 'rgba(13,148,136,0.06)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
      }
    }

    function initAnalyticsCharts() {
      const ctx = document.getElementById('chRead');
      if (ctx && !ctx._chart) {
        ctx._chart = new Chart(ctx, { type: 'line', data: { labels: ['01/01', '01/05', '01/10', '01/15', '01/20', '01/25'], datasets: [{ label: '阅读量', data: [12000, 15000, 13500, 18000, 16000, 22000], borderColor: '#0d9488', backgroundColor: 'rgba(13,148,136,0.06)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
      }
    }

        </div>

          <div class="tb"><div class="tb-l"><input class="inp" placeholder="搜索文章..."><select class="sel"><option>全部状态</option><option>已发布</option><option>草稿</option></select></div><div class="tb-r"><button class="btn bp" onclick="openArtEd()"><i class="fas fa-plus"></i> 创作文章</button><button class="btn bg" onclick="openFetchModal()"><i class="fas fa-cloud-download-alt"></i> 抓取文章</button></div></div>
          <div class="cd"><div class="cd-h"><h3>文章列表</h3></div><div class="tw"><table><thead><tr><th>标题</th><th>平台</th><th>状态</th><th>操作</th></tr></thead><tbody><tr><td>自媒体运营的10个核心技巧</td><td>微信,头条</td><td><span class="badge b-ok">已发布</span></td><td><button class="btn bsm bg" onclick="openArtEd()">编辑</button> <button class="btn bsm bg" onclick="openShareModal()">分享</button></td></tr><tr><td>2024年广告投放趋势分析</td><td>百家号</td><td><span class="badge b-wr">草稿</span></td><td><button class="btn bsm bg" onclick="openArtEd()">编辑</button></td></tr></tbody></table></div></div>

        </div>

          <div class="cd"><div class="tw"><table><thead><tr><th>用户</th><th>角色</th><th>权限</th><th>操作</th></tr></thead><tbody><tr><td>管理员</td><td>超级管理员</td><td>全部</td><td><button class="btn bsm bg">编辑</button></td></tr><tr><td>张三</td><td>编辑</td><td>文章管理</td><td><button class="btn bsm bg">编辑</button></td></tr></tbody></table></div></div>

        <div class="pg" id="pg-data">
          <div class="cd"><div class="cd-h"><h3>数据管理</h3></div><div class="cd-b"><button class="btn bp" onclick="toast('数据备份中...','info')">备份</button> <button class="btn bg" onclick="toast('恢复功能','info')">恢复</button> <button class="btn bg" onclick="toast('缓存已清除','ok')">清除缓存</button></div></div>

          <div class="cd"><div class="cd-h"><h3>个人中心</h3></div><div class="cd-b"><p>用户名：管理员 | 角色：超级管理员</p><button class="btn bp" onclick="toast('信息已更新','ok')">保存</button></div></div>

    }

    document.addEventListener('DOMContentLoaded', () => {
      renderNotifications();
      document.querySelectorAll('.ni').forEach(el => el.addEventListener('click', function() { nav(this.dataset.p); }));
      document.addEventListener('click', function(e) {
        const np = document.getElementById('nPnl'),
          nb = document.getElementById('nBtn');
        if (np && np.classList.contains('on') && !np.contains(e.target) && !nb.contains(e.target)) np.classList.remove('on');
      });
      document.querySelectorAll('.mdl').forEach(mdl => {
        mdl.addEventListener('click', function(e) { if (e.target === this) clsMdl(this.id); });
      });
    });
  </script>
</body>

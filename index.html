<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智媒投放系统 - 自媒体广告投放推广平台</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <!-- WangEditor CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@wangeditor/editor@5.1.23/dist/css/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        .layout-container {
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background-color: #304156;
            color: #bfcbd9;
            overflow-y: auto;
        }
        .logo {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2b3a4a;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .sidebar .el-menu {
            border-right: none;
        }
        .header {
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #e6e6e6;
            height: 60px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: #f0f2f6;
            padding: 20px;
        }
        .stat-card {
            display: flex;
            align-items: center;
            padding: 20px;
        }
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .stat-info {
            margin-left: 20px;
        }
        .stat-title {
            font-size: 14px;
            color: #666;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        .notification-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .notification-item.unread {
            background: #f0f9ff;
        }
        .notify-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .notify-content {
            font-size: 13px;
            color: #666;
        }
        .notify-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .pool-card {
            text-align: center;
        }
        .pool-card .label {
            font-size: 14px;
            color: #666;
        }
        .pool-card .value {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* 富文本编辑器容器 */
        .editor-wrapper {
            border: 1px solid #ccc;
            z-index: 1000;
        }
        /* 滚动条优化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="app">
        <router-view></router-view>
    </div>

    <!-- 依赖库 -->
    <script src="https://unpkg.com/vue@3.3.4/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4.2.4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios@1.4.0/dist/axios.min.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- wangEditor -->
    <script src="https://unpkg.com/@wangeditor/editor@5.1.23/dist/index.js"></script>
    <script src="https://unpkg.com/@wangeditor/editor-for-vue@5.1.12/dist/index.js"></script>
    
    <script>
        // 模拟后端数据存储 (内存)
        const mockDB = {
            users: [],
            articles: [],
            ads: [],
            revenues: [],
            notifications: [],
            shares: []
        };

        // 辅助函数
        function uuid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
        function formatDate(iso) { return new Date(iso).toLocaleString(); }

        // 初始化模拟数据
        function initMockData() {
            if (mockDB.users.length === 0) {
                mockDB.users.push({
                    id: 'admin-id', username: 'admin', password: 'admin123', name: '系统管理员', email: 'admin@example.com', phone: '13800138000',
                    role: 'admin', avatar: 'https://cube.elemecdn.com/0/88/03b947d3b9f9b1b8c9c0b0b1b1b1b1b1.png', status: 'active', createdAt: new Date().toISOString(),
                    balance: 12800, level: 3
                });
                mockDB.users.push({
                    id: 'creator-id', username: 'creator', password: 'creator123', name: '内容创作者', email: 'creator@example.com', phone: '13900139000',
                    role: 'creator', avatar: 'https://cube.elemecdn.com/0/88/03b947d3b9f9b1b8c9c0b0b1b1b1b1b1.png', status: 'active', createdAt: new Date().toISOString(),
                    balance: 1250.5, level: 2
                });
                mockDB.users.push({
                    id: 'advertiser-id', username: 'advertiser', password: 'ad123', name: '广告主', email: 'ad@example.com', phone: '13700137000',
                    role: 'advertiser', avatar: 'https://cube.elemecdn.com/0/88/03b947d3b9f9b1b8c9c0b0b1b1b1b1b1.png', status: 'active', createdAt: new Date().toISOString(),
                    balance: 5000, level: 1
                });
            }
            if (mockDB.articles.length === 0) {
                mockDB.articles.push({
                    id: uuid(), title: '自媒体运营入门指南', content: '<p>这是一篇关于自媒体运营的详细指南，包含内容创作、平台选择等。</p>', summary: '自媒体运营入门指南', coverImage: '', tags: ['运营'], authorId: 'creator-id', authorName: '内容创作者', status: 'published', views: 234, shares: 12, publishPlatforms: ['微信', '头条'], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
                });
            }
            if (mockDB.ads.length === 0) {
                mockDB.ads.push({
                    id: uuid(), name: '品牌推广广告', type: 'image', mediaUrl: 'https://picsum.photos/200/100', content: '优质产品等你来', link: 'https://example.com', placement: 'top', format: 'banner', budget: 5000, price: 15, startTime: new Date().toISOString(), endTime: new Date().toISOString(), status: 'active', creatorId: 'advertiser-id', creatorName: '广告主', impressions: 1200, clicks: 56, spend: 840, createdAt: new Date().toISOString()
                });
            }
            if (mockDB.notifications.length === 0) {
                mockDB.notifications.push({ id: uuid(), userId: 'creator-id', title: '文章审核通过', content: '您的文章《自媒体运营入门指南》已通过审核', type: 'success', read: false, createdAt: new Date().toISOString() });
            }
        }
        initMockData();

        // 模拟API (拦截axios调用)
        const mockApi = (method, url, data = null, params = null) => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    try {
                        // 登录/注册
                        if (url === '/api/auth/login' && method === 'post') {
                            const { username, password } = data;
                            const user = mockDB.users.find(u => u.username === username);
                            if (!user) return reject({ response: { data: { error: '用户不存在' } } });
                            if (user.password !== password) return reject({ response: { data: { error: '密码错误' } } });
                            const token = 'mock-token-' + user.id;
                            resolve({ data: { token, user: { ...user, password: undefined } } });
                        }
                        else if (url === '/api/auth/register' && method === 'post') {
                            const { username, password, name, email } = data;
                            if (mockDB.users.find(u => u.username === username)) return reject({ response: { data: { error: '用户名已存在' } } });
                            const newUser = { id: uuid(), username, password, name, email, phone: '', role: 'creator', avatar: 'https://cube.elemecdn.com/0/88/03b947d3b9f9b1b8c9c0b0b1b1b1b1b1.png', status: 'active', createdAt: new Date().toISOString(), balance: 0, level: 1 };
                            mockDB.users.push(newUser);
                            resolve({ data: { message: '注册成功', user: { ...newUser, password: undefined } } });
                        }
                        // 文章相关
                        else if (url === '/api/articles' && method === 'get') {
                            let articles = mockDB.articles.filter(a => a.authorId === (params?.authorId || mockDB.currentUser?.id) || mockDB.currentUser?.role === 'admin');
                            if (params?.keyword) articles = articles.filter(a => a.title.includes(params.keyword) || a.content.includes(params.keyword));
                            if (params?.status) articles = articles.filter(a => a.status === params.status);
                            resolve({ data: articles.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt)) });
                        }
                        else if (url === '/api/articles' && method === 'post') {
                            const newArticle = { id: uuid(), ...data, authorId: mockDB.currentUser.id, authorName: mockDB.currentUser.name, status: 'draft', views: 0, shares: 0, publishPlatforms: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
                            mockDB.articles.push(newArticle);
                            resolve({ data: newArticle });
                        }
                        else if (url.match(/\/api\/articles\/\w+$/) && method === 'put') {
                            const id = url.split('/').pop();
                            const index = mockDB.articles.findIndex(a => a.id === id);
                            if (index !== -1) { mockDB.articles[index] = { ...mockDB.articles[index], ...data, updatedAt: new Date().toISOString() }; resolve({ data: mockDB.articles[index] }); }
                            else reject({ response: { data: { error: '文章不存在' } } });
                        }
                        else if (url.match(/\/api\/articles\/\w+$/) && method === 'delete') {
                            const id = url.split('/').pop();
                            mockDB.articles = mockDB.articles.filter(a => a.id !== id);
                            resolve({ data: { message: '删除成功' } });
                        }
                        else if (url.match(/\/api\/articles\/\w+\/publish/) && method === 'post') {
                            const id = url.split('/')[3];
                            const article = mockDB.articles.find(a => a.id === id);
                            if (article) { article.status = 'published'; article.publishPlatforms = data.platforms; article.publishedAt = new Date().toISOString(); }
                            mockDB.notifications.push({ id: uuid(), userId: mockDB.currentUser.id, title: '文章发布成功', content: `《${article.title}》已发布到 ${data.platforms.join(', ')}`, type: 'success', read: false, createdAt: new Date().toISOString() });
                            resolve({ data: { message: '发布成功', article } });
                        }
                        else if (url === '/api/articles/fetch' && method === 'post') {
                            resolve({ data: { title: '抓取示例：AI写作技巧', content: '<p>这是通过模拟抓取获取的内容，您可以继续编辑。</p><p>实际对接平台可扩展。</p>' } });
                        }
                        // 广告相关
                        else if (url === '/api/ads' && method === 'get') {
                            let ads = mockDB.ads;
                            if (mockDB.currentUser.role === 'creator') ads = ads.filter(a => a.creatorId === mockDB.currentUser.id);
                            resolve({ data: ads });
                        }
                        else if (url === '/api/ads' && method === 'post') {
                            const newAd = { id: uuid(), ...data, creatorId: mockDB.currentUser.id, creatorName: mockDB.currentUser.name, status: 'pending', impressions: 0, clicks: 0, spend: 0, createdAt: new Date().toISOString() };
                            mockDB.ads.push(newAd);
                            resolve({ data: newAd });
                        }
                        else if (url.match(/\/api\/ads\/\w+$/) && method === 'put') {
                            const id = url.split('/').pop();
                            const index = mockDB.ads.findIndex(a => a.id === id);
                            if (index !== -1) { mockDB.ads[index] = { ...mockDB.ads[index], ...data }; resolve({ data: mockDB.ads[index] }); }
                        }
                        else if (url.match(/\/api\/ads\/\w+$/) && method === 'delete') {
                            const id = url.split('/').pop();
                            mockDB.ads = mockDB.ads.filter(a => a.id !== id);
                            resolve({ data: { message: '删除成功' } });
                        }
                        else if (url.match(/\/api\/ads\/\w+\/submit/) && method === 'post') {
                            const id = url.split('/')[3];
                            const ad = mockDB.ads.find(a => a.id === id);
                            if (ad) ad.status = 'active';
                            resolve({ data: { message: '广告已提交投放' } });
                        }
                        else if (url === '/api/ads/:id/click' && method === 'post') { resolve({ data: {} }); }
                        // 用户管理
                        else if (url === '/api/users' && method === 'get') {
                            if (mockDB.currentUser.role !== 'admin') return reject({ response: { data: { error: '权限不足' } } });
                            resolve({ data: mockDB.users.map(u => ({ ...u, password: undefined })) });
                        }
                        else if (url.match(/\/api\/users\/\w+$/) && method === 'put') {
                            const id = url.split('/').pop();
                            const index = mockDB.users.findIndex(u => u.id === id);
                            if (index !== -1) { mockDB.users[index] = { ...mockDB.users[index], ...data }; resolve({ data: { ...mockDB.users[index], password: undefined } }); }
                        }
                        else if (url.match(/\/api\/users\/\w+$/) && method === 'delete') {
                            const id = url.split('/').pop();
                            mockDB.users = mockDB.users.filter(u => u.id !== id);
                            resolve({ data: { message: '删除成功' } });
                        }
                        else if (url === '/api/user/profile' && method === 'get') { resolve({ data: { ...mockDB.currentUser, password: undefined } }); }
                        else if (url === '/api/user/profile' && method === 'put') {
                            Object.assign(mockDB.currentUser, data);
                            const idx = mockDB.users.findIndex(u => u.id === mockDB.currentUser.id);
                            if (idx !== -1) mockDB.users[idx] = mockDB.currentUser;
                            resolve({ data: { ...mockDB.currentUser, password: undefined } });
                        }
                        // 收益
                        else if (url === '/api/revenues' && method === 'get') {
                            let revs = mockDB.revenues.filter(r => r.userId === mockDB.currentUser.id);
                            if (mockDB.currentUser.role === 'admin') revs = mockDB.revenues;
                            resolve({ data: revs });
                        }
                        else if (url === '/api/revenues/withdraw' && method === 'post') {
                            const { amount } = data;
                            if (mockDB.currentUser.balance < amount) return reject({ response: { data: { error: '余额不足' } } });
                            mockDB.currentUser.balance -= amount;
                            const withdrawRecord = { id: uuid(), userId: mockDB.currentUser.id, amount, type: 'withdraw', status: 'pending', createdAt: new Date().toISOString() };
                            mockDB.revenues.push(withdrawRecord);
                            resolve({ data: { message: '提现申请已提交', newBalance: mockDB.currentUser.balance } });
                        }
                        else if (url === '/api/revenues/pool' && method === 'get') {
                            resolve({ data: { totalPool: 158000, totalBudget: 500000, userLevel: mockDB.currentUser.level, userBalance: mockDB.currentUser.balance, levelBenefits: { 1: '基础收益分成 50%', 2: '高级收益分成 70%', 3: '顶级收益分成 90%' } } });
                        }
                        // 数据分析
                        else if (url === '/api/analytics/dashboard' && method === 'get') {
                            const userArticles = mockDB.articles.filter(a => a.authorId === mockDB.currentUser.id);
                            const totalViews = userArticles.reduce((s, a) => s + (a.views || 0), 0);
                            const totalShares = userArticles.reduce((s, a) => s + (a.shares || 0), 0);
                            const myAds = mockDB.ads.filter(a => a.creatorId === mockDB.currentUser.id);
                            const adClicks = myAds.reduce((s, a) => s + (a.clicks || 0), 0);
                            const trends = [];
                            for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); trends.push({ date: d.toISOString().split('T')[0], views: Math.floor(Math.random() * 1000), earnings: Math.floor(Math.random() * 500) }); }
                            resolve({ data: { totalArticles: userArticles.length, totalViews, totalShares, totalAds: myAds.length, adClicks, adRevenue: myAds.reduce((s, a) => s + a.spend, 0), trends } });
                        }
                        // 通知
                        else if (url === '/api/notifications' && method === 'get') {
                            const notifs = mockDB.notifications.filter(n => n.userId === mockDB.currentUser.id).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                            resolve({ data: notifs });
                        }
                        else if (url.match(/\/api\/notifications\/\w+\/read/) && method === 'put') {
                            const id = url.split('/')[3];
                            const notif = mockDB.notifications.find(n => n.id === id);
                            if (notif) notif.read = true;
                            resolve({ data: { message: '已读' } });
                        }
                        // 分享
                        else if (url === '/api/shares' && method === 'post') {
                            const { articleId, platform } = data;
                            const earnings = Math.random() * 10;
                            mockDB.shares.push({ id: uuid(), userId: mockDB.currentUser.id, articleId, platform, earnings, createdAt: new Date().toISOString() });
                            mockDB.currentUser.balance += earnings;
                            const article = mockDB.articles.find(a => a.id === articleId);
                            if (article) article.shares = (article.shares || 0) + 1;
                            resolve({ data: { message: '分享成功', earnings, newBalance: mockDB.currentUser.balance } });
                        }
                        else if (url === '/api/workbench' && method === 'get') {
                            const tasks = [];
                            if (mockDB.currentUser.role === 'creator') {
                                const draftCount = mockDB.articles.filter(a => a.authorId === mockDB.currentUser.id && a.status === 'draft').length;
                                tasks.push({ type: 'article', count: draftCount, text: '待发布文章' });
                            }
                            if (mockDB.currentUser.role === 'advertiser') {
                                const pendingAds = mockDB.ads.filter(a => a.creatorId === mockDB.currentUser.id && a.status === 'pending').length;
                                tasks.push({ type: 'ad', count: pendingAds, text: '待审核广告' });
                            }
                            resolve({ data: { tasks, quickStats: { todayViews: Math.floor(Math.random() * 500), todayEarnings: Math.floor(Math.random() * 100) } } });
                        }
                        else if (url === '/api/upload' && method === 'post') {
                            resolve({ data: { url: 'https://picsum.photos/200/150?random=' + Date.now() } });
                        }
                        else {
                            reject({ response: { data: { error: '接口未模拟' } } });
                        }
                    } catch(e) { reject({ response: { data: { error: e.message } } }); }
                }, 200);
            });
        };

        // 全局axios替换
        axios.defaults.adapter = function(config) { return mockApi(config.method, config.url, config.data, config.params); };
        
        // Vue Router
        const { createRouter, createWebHashHistory } = VueRouter;
        // 组件定义（简化版，所有页面组件挂载）
        const Layout = { template: '#layout-template' };
        const Login = { template: '#login-template' };
        const Register = { template: '#register-template' };
        const Dashboard = { template: '#dashboard-template' };
        const ArticleManage = { template: '#article-manage-template' };
        const AdManage = { template: '#ad-manage-template' };
        const DataManage = { template: '#data-manage-template' };
        const DataAnalysis = { template: '#data-analysis-template' };
        const UserManage = { template: '#user-manage-template' };
        const SystemSettings = { template: '#system-settings-template' };
        const RevenueCenter = { template: '#revenue-center-template' };
        const PersonalCenter = { template: '#personal-center-template' };
        const Workbench = { template: '#workbench-template' };

        const routes = [
            { path: '/login', component: Login },
            { path: '/register', component: Register },
            { path: '/', component: Layout, meta: { requiresAuth: true }, children: [
                { path: '', redirect: '/dashboard' },
                { path: 'dashboard', component: Dashboard, meta: { title: '仪表盘' } },
                { path: 'articles', component: ArticleManage, meta: { title: '文章管理' } },
                { path: 'ads', component: AdManage, meta: { title: '广告管理' } },
                { path: 'data', component: DataManage, meta: { title: '数据管理' } },
                { path: 'analytics', component: DataAnalysis, meta: { title: '数据分析' } },
                { path: 'users', component: UserManage, meta: { title: '用户管理', role: 'admin' } },
                { path: 'settings', component: SystemSettings, meta: { title: '系统设置' } },
                { path: 'revenue', component: RevenueCenter, meta: { title: '收益中心' } },
                { path: 'profile', component: PersonalCenter, meta: { title: '个人中心' } },
                { path: 'workbench', component: Workbench, meta: { title: '工作台' } }
            ] }
        ];

        const router = createRouter({ history: createWebHashHistory(), routes });
        
        // 全局状态简单store
        const app = Vue.createApp({});
        app.config.globalProperties.$mockDB = mockDB;
        app.config.globalProperties.$axios = axios;
        
        // 注册Element Plus
        app.use(ElementPlus);
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) { app.component(key, component); }
        // 注册wangEditor组件
        app.component('Toolbar', WangEditorForVue.Toolbar);
        app.component('Editor', WangEditorForVue.Editor);
        
        // 全局路由守卫
        router.beforeEach((to, from, next) => {
            const token = localStorage.getItem('token');
            if (to.meta.requiresAuth && !token) { next('/login'); }
            else if (to.meta.role && (!mockDB.currentUser || mockDB.currentUser.role !== to.meta.role)) { next('/dashboard'); }
            else { next(); }
        });
        
        app.use(router);
        app.mount('#app');
        
        // 后续组件模板定义通过挂载时编译
    </script>

    <!-- 模板定义 -->
    <script type="text/x-template" id="login-template">
        <div class="login-container" style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)">
            <el-card style="width:450px;padding:20px"><h2 style="text-align:center;margin-bottom:30px">智媒投放系统</h2>
            <el-form ref="formRef" :model="form" :rules="rules">
                <el-form-item prop="username"><el-input v-model="form.username" placeholder="用户名" prefix-icon="User" size="large"/></el-form-item>
                <el-form-item prop="password"><el-input v-model="form.password" type="password" placeholder="密码" prefix-icon="Lock" size="large" show-password/></el-form-item>
                <el-form-item><el-button type="primary" size="large" style="width:100%" @click="handleLogin">登录</el-button></el-form-item>
                <div style="display:flex;justify-content:space-between"><el-link type="primary" @click="$router.push('/register')">还没有账号？立即注册</el-link><el-link type="primary" @click="forgot">忘记密码？</el-link></div>
            </el-form></el-card>
        </div>
    </script>
